<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>جيم تراكر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #1e2128; --surface: #272b33; --surface2: #2f343e;
    --accent: #4f8ef7; --accent-light: #7aabff; --accent2: #ff5c6c;
    --green: #34c78a; --text: #eef0f4; --text-muted: #8b93a4;
    --border: #363c48; --radius: 16px;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Cairo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

  .app-header { position:sticky; top:0; z-index:100; background:rgba(30,33,40,0.96); backdrop-filter:blur(14px); border-bottom:1px solid var(--border); padding:14px 20px; display:flex; align-items:center; justify-content:space-between; }
  .header-title { font-size:1.15rem; font-weight:700; }
  .header-back { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:8px 14px; font-family:'Cairo',sans-serif; font-size:0.85rem; cursor:pointer; }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(39,43,51,0.97); backdrop-filter:blur(12px); border-top:1px solid var(--border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
  .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 0 8px; cursor:pointer; color:var(--text-muted); font-size:0.7rem; gap:4px; border:none; background:none; font-family:'Cairo',sans-serif; transition:all 0.2s; }
  .nav-item .nav-icon { font-size:1.3rem; }
  .nav-item.active { color:var(--accent); }

  .main { padding:16px 16px 90px; }
  .screen { display:none; } .screen.active { display:block; }

  .btn-primary { width:100%; background:var(--accent); color:#fff; border:none; border-radius:12px; padding:14px; font-family:'Cairo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 16px rgba(79,142,247,0.3); }
  .btn-primary:active { transform:scale(0.98); }
  .btn-secondary { flex:1; background:transparent; border:1px solid var(--border); color:var(--text); border-radius:12px; padding:13px; font-family:'Cairo',sans-serif; font-size:0.9rem; cursor:pointer; }
  .btn-save { flex:2; background:var(--accent); border:none; color:#fff; border-radius:12px; padding:13px; font-family:'Cairo',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; }
  .quick-log-btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); padding:16px; font-family:'Cairo',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; margin-bottom:24px; transition:all 0.2s; box-shadow:0 4px 20px rgba(79,142,247,0.25); }
  .quick-log-btn:active { transform:scale(0.98); }
  .section-title { font-size:0.75rem; font-weight:700; color:var(--text-muted); letter-spacing:0.1em; margin-bottom:12px; text-transform:uppercase; }

  .search-bar { display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:10px 14px; margin-bottom:14px; }
  .search-bar input { flex:1; background:none; border:none; color:var(--text); font-family:'Cairo',sans-serif; font-size:0.9rem; outline:none; }
  .search-bar input::placeholder { color:var(--text-muted); }
  .search-icon { color:var(--text-muted); font-size:1rem; }

  /* HOME */
  .greeting { margin-bottom:20px; }
  .greeting h1 { font-size:1.6rem; font-weight:900; line-height:1.2; }
  .greeting h1 span { color:var(--accent-light); }
  .greeting p { color:var(--text-muted); font-size:0.85rem; margin-top:4px; }

  /* WEEKLY STATS */
  .week-stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:20px; }
  .week-stat { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 10px; text-align:center; }
  .week-stat .ws-val { font-size:1.3rem; font-weight:900; color:var(--accent-light); }
  .week-stat .ws-lbl { font-size:0.68rem; color:var(--text-muted); margin-top:2px; }
  .best-week-card { background:linear-gradient(135deg,#1e3a5f,#1a2d4a); border:1px solid #2a4a7f; border-radius:var(--radius); padding:14px 16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
  .best-week-card .bw-icon { font-size:1.8rem; }
  .best-week-card .bw-label { font-size:0.75rem; color:#7aabff; font-weight:700; }
  .best-week-card .bw-val { font-size:1rem; font-weight:700; color:#fff; }

  /* BODY WEIGHT STRIP */
  .bw-strip { background:linear-gradient(135deg,#2f3a50,#243048); border:1px solid #3a4a66; border-radius:var(--radius); padding:14px 16px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .bw-info { flex:1; }
  .bw-label { font-size:0.75rem; color:#7aabff; font-weight:700; margin-bottom:3px; }
  .bw-value { font-size:1.6rem; font-weight:900; color:#fff; line-height:1; }
  .bw-sub { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }
  .bw-btn { background:rgba(79,142,247,0.2); border:1px solid rgba(79,142,247,0.4); color:var(--accent-light); border-radius:10px; padding:8px 14px; font-family:'Cairo',sans-serif; font-size:0.82rem; font-weight:700; cursor:pointer; }

  /* MUSCLE GRID */
  .muscle-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:28px; }
  .muscle-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .muscle-card::before { content:''; position:absolute; top:0; right:0; width:4px; height:100%; border-radius:0 var(--radius) var(--radius) 0; }
  .muscle-card:active { transform:scale(0.97); background:var(--surface2); }
  .muscle-card .muscle-icon { font-size:1.8rem; margin-bottom:6px; }
  .muscle-card .muscle-name { font-size:0.9rem; font-weight:700; }
  .muscle-card .muscle-count { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
  .muscle-card[data-muscle="أرجل"]::before { background:#ff6b35; }
  .muscle-card[data-muscle="صدر"]::before { background:#e84393; }
  .muscle-card[data-muscle="ظهر"]::before { background:#00d4aa; }
  .muscle-card[data-muscle="كتف"]::before { background:#7c4dff; }
  .muscle-card[data-muscle="بايسبس / ترايسبس"]::before { background:#ffd700; }

  /* SESSION CARD */
  .session-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:12px; transition:all 0.15s; }
  .session-icon { width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.1rem; flex-shrink:0; }
  .session-info { flex:1; min-width:0; cursor:pointer; }
  .session-name { font-size:0.88rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .session-meta { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }
  .session-quick-log { background:rgba(79,142,247,0.15); border:1px solid rgba(79,142,247,0.3); color:var(--accent-light); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.1rem; flex-shrink:0; }

  /* EXERCISE ITEM */
  .exercise-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; gap:12px; cursor:pointer; transition:all 0.15s; }
  .exercise-item:active { background:var(--surface2); }
  .exercise-thumb { width:50px; height:50px; border-radius:12px; background:var(--surface2); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1.4rem; overflow:hidden; }
  .exercise-thumb img { width:100%; height:100%; object-fit:contain; background:#252930; }
  .exercise-info { flex:1; min-width:0; }
  .exercise-name { font-size:0.9rem; font-weight:600; }
  .exercise-last { font-size:0.75rem; color:var(--text-muted); margin-top:3px; }
  .exercise-actions { display:flex; gap:6px; }
  .icon-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:0.85rem; transition:all 0.15s; }
  .icon-btn:hover { color:var(--accent); border-color:var(--accent); }
  .icon-btn.danger:hover { color:var(--accent2); border-color:var(--accent2); }

  .pr-badge { display:inline-flex; align-items:center; gap:3px; background:rgba(79,142,247,0.15); color:var(--accent-light); border:1px solid rgba(79,142,247,0.3); border-radius:6px; padding:2px 6px; font-size:0.7rem; font-weight:700; }
  .compare-up { color:var(--green); font-weight:700; font-size:0.8rem; }
  .compare-down { color:var(--accent2); font-weight:700; font-size:0.8rem; }
  .compare-same { color:var(--text-muted); font-size:0.8rem; }

  /* LOG */
  .log-header { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; display:flex; align-items:center; gap:12px; }
  .log-exercise-thumb { width:64px; height:64px; border-radius:12px; background:var(--surface2); display:flex; align-items:center; justify-content:center; font-size:1.8rem; overflow:hidden; flex-shrink:0; }
  .log-exercise-thumb img { width:100%; height:100%; object-fit:contain; background:#252930; }
  .prev-record { background:linear-gradient(135deg,#2a3245,#243040); border:1px solid #3a4a66; border-radius:12px; padding:12px 16px; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
  .prev-record .label { font-size:0.78rem; color:var(--text-muted); }
  .prev-record .value { font-size:0.9rem; font-weight:700; color:var(--accent-light); }

  .sets-container { margin-bottom:20px; }
  .set-row { display:grid; grid-template-columns:28px 1fr 1fr auto; gap:8px; align-items:center; margin-bottom:8px; }
  .set-num { font-size:0.8rem; color:var(--text-muted); font-weight:700; text-align:center; }
  .set-input { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 10px; color:var(--text); font-family:'Cairo',sans-serif; font-size:1rem; font-weight:600; text-align:center; width:100%; }
  .set-input:focus { outline:none; border-color:var(--accent); background:var(--surface2); }
  .set-input::placeholder { color:var(--text-muted); font-weight:400; }
  .set-label-row { display:grid; grid-template-columns:28px 1fr 1fr auto; gap:8px; margin-bottom:6px; }
  .set-label { font-size:0.72rem; color:var(--text-muted); text-align:center; }
  .add-set-btn { width:100%; background:transparent; border:1px dashed var(--border); border-radius:10px; padding:12px; color:var(--text-muted); font-family:'Cairo',sans-serif; font-size:0.85rem; cursor:pointer; margin-bottom:16px; transition:all 0.2s; }
  .add-set-btn:hover { border-color:var(--accent); color:var(--accent); }
  .notes-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'Cairo',sans-serif; font-size:0.9rem; margin-bottom:16px; resize:none; height:70px; }
  .notes-input:focus { outline:none; border-color:var(--accent); }

  /* WEIGHT PROGRESS CHART */
  .progress-chart-wrap { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; }
  .progress-chart { position:relative; height:80px; display:flex; align-items:flex-end; gap:4px; margin-top:8px; }
  .progress-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; flex:1; }
  .progress-bar { width:100%; border-radius:4px 4px 0 0; background:linear-gradient(180deg,var(--accent),#2a4a80); min-height:4px; transition:height 0.4s; }
  .progress-bar-val { font-size:0.58rem; color:var(--text-muted); white-space:nowrap; }

  /* HISTORY */
  .history-date-group { margin-bottom:20px; }
  .history-date { font-size:0.75rem; color:var(--text-muted); font-weight:700; margin-bottom:8px; padding-right:4px; }
  .history-item { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:6px; }
  .history-item-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .history-item-name { font-size:0.88rem; font-weight:600; }
  .history-item-muscle { font-size:0.72rem; padding:2px 8px; border-radius:20px; font-weight:600; }
  .history-sets-grid { display:flex; gap:6px; flex-wrap:wrap; }
  .history-set-chip { background:var(--surface2); border-radius:8px; padding:4px 8px; font-size:0.75rem; color:var(--text-muted); }
  .history-set-chip span { color:var(--text); font-weight:600; }
  /* edit session btn */
  .history-edit-btn { background:rgba(79,142,247,0.1); border:1px solid rgba(79,142,247,0.25); color:var(--accent-light); border-radius:8px; padding:3px 8px; font-family:'Cairo',sans-serif; font-size:0.72rem; cursor:pointer; }
  .history-delete-btn { background:rgba(255,92,108,0.1); border:1px solid rgba(255,92,108,0.25); color:var(--accent2); border-radius:8px; padding:3px 8px; font-family:'Cairo',sans-serif; font-size:0.72rem; cursor:pointer; }

  /* CALENDAR */
  .calendar-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .calendar-month { font-size:1rem; font-weight:700; }
  .cal-nav { background:var(--surface); border:1px solid var(--border); color:var(--text); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1rem; }
  .calendar-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:20px; }
  .cal-day-name { font-size:0.65rem; color:var(--text-muted); text-align:center; padding:4px 0; font-weight:700; }
  .cal-day { aspect-ratio:1; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:0.75rem; color:var(--text-muted); cursor:default; }
  .cal-day.has-session { background:rgba(79,142,247,0.18); color:var(--accent-light); font-weight:700; border:1px solid rgba(79,142,247,0.35); cursor:pointer; }
  .cal-day.today { border:1px solid var(--accent); color:var(--accent-light); }
  .cal-day.today.has-session { background:rgba(79,142,247,0.28); }
  .cal-day.empty { opacity:0; pointer-events:none; }
  .cal-stats { display:flex; gap:10px; margin-bottom:20px; }
  .cal-stat { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
  .cal-stat .val { font-size:1.4rem; font-weight:700; color:var(--accent-light); }
  .cal-stat .lbl { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }

  /* BODY WEIGHT SCREEN */
  .bw-chart-area { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:16px; overflow-x:auto; }
  .bw-chart { display:flex; align-items:flex-end; gap:6px; height:100px; min-width:100%; }
  .bw-bar-wrap { display:flex; flex-direction:column; align-items:center; gap:4px; flex:1; min-width:30px; }
  .bw-bar { width:100%; background:linear-gradient(180deg,var(--accent),#2a4a80); border-radius:6px 6px 0 0; }
  .bw-bar-label { font-size:0.6rem; color:var(--text-muted); white-space:nowrap; }
  .bw-entry { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
  .bw-entry-weight { font-size:1.1rem; font-weight:700; color:var(--accent-light); }
  .bw-entry-date { font-size:0.75rem; color:var(--text-muted); }
  .bw-trend-up { color:var(--accent2); font-size:0.8rem; font-weight:700; }
  .bw-trend-down { color:var(--green); font-size:0.8rem; font-weight:700; }

  /* MANAGE */
  .manage-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .manage-tab { flex:1; background:var(--surface); border:1px solid var(--border); color:var(--text-muted); border-radius:10px; padding:10px; font-family:'Cairo',sans-serif; font-size:0.85rem; cursor:pointer; transition:all 0.2s; text-align:center; }
  .manage-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); font-weight:700; }

  /* DETAIL */
  .exercise-detail-img { width:100%; height:220px; border-radius:var(--radius); margin-bottom:16px; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:4rem; overflow:hidden; }
  .exercise-detail-img img { width:100%; height:100%; object-fit:contain; background:#252930; }
  .stats-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
  .stat-box { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center; }
  .stat-box .stat-val { font-size:1.3rem; font-weight:700; color:var(--accent-light); }
  .stat-box .stat-label { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }

  /* MODAL */
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); z-index:500; display:none; align-items:flex-end; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:24px 24px 0 0; padding:24px 20px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; animation:slideUp 0.3s ease; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-title { font-size:1.1rem; font-weight:700; margin-bottom:20px; }
  .modal-drag { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .form-group { margin-bottom:14px; }
  .form-label { font-size:0.82rem; color:var(--text-muted); margin-bottom:6px; display:block; }
  .form-input,.form-select { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'Cairo',sans-serif; font-size:0.9rem; }
  .form-input:focus,.form-select:focus { outline:none; border-color:var(--accent); }
  .form-select option { background:var(--surface); }
  .image-upload-area { border:2px dashed var(--border); border-radius:12px; padding:20px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; }
  .image-upload-area:hover { border-color:var(--accent); }
  .image-upload-area input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .preview-img { width:100%; height:140px; object-fit:contain; border-radius:8px; margin-top:10px; background:var(--bg); }
  .upload-icon { font-size:2rem; margin-bottom:6px; }
  .upload-text { font-size:0.82rem; color:var(--text-muted); }
  .modal-actions { display:flex; gap:10px; margin-top:20px; }

  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%); background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:10px 20px; font-size:0.85rem; z-index:999; opacity:0; transition:all 0.3s; white-space:nowrap; }
  .toast.show { opacity:1; }
  .toast.success { border-color:var(--accent); color:var(--accent-light); }
  .toast.error { border-color:var(--accent2); color:var(--accent2); }


  /* LIGHT THEME */
  body.light {
    --bg: #f0f2f5; --surface: #ffffff; --surface2: #e8eaf0;
    --accent: #2563eb; --accent-light: #1d4ed8; --accent2: #dc2626;
    --green: #16a34a; --text: #1a1d23; --text-muted: #6b7280;
    --border: #d1d5db;
  }
  body.light .app-header { background: rgba(240,242,245,0.96); }
  body.light .bottom-nav { background: rgba(255,255,255,0.97); }
  body.light .bw-strip { background: linear-gradient(135deg,#dbeafe,#eff6ff); border-color:#bfdbfe; }
  body.light .bw-label { color:#1d4ed8; }
  body.light .bw-value { color:#1a1d23; }
  body.light .prev-record { background: linear-gradient(135deg,#dbeafe,#eff6ff); border-color:#bfdbfe; }
  body.light .best-week-card { background:linear-gradient(135deg,#dbeafe,#eff6ff); border-color:#bfdbfe; }
  body.light .best-week-card .bw-label { color:#1d4ed8; }
  body.light .best-week-card .bw-val { color:#1a1d23; }
  body.light .set-input { background:var(--surface2); }
  body.light .form-input, body.light .form-select { background:var(--surface2); color:var(--text); }
  body.light .modal { background:#ffffff; }
  body.light .toast { background:#ffffff; }
  body.light .pr-badge { background:rgba(37,99,235,0.1); color:#1d4ed8; border-color:rgba(37,99,235,0.3); }
  body.light .history-set-chip { background:var(--surface2); }
  body.light .cal-day.has-session { background:rgba(37,99,235,0.12); color:#1d4ed8; border-color:rgba(37,99,235,0.3); }

// ── INIT ──
async function initSupabase(url, key) {
  try { sbClient = window.supabase.createClient(url, key); await setupDatabase(); initApp(); }
  catch(e) { console.error(e); }
}
async function setupDatabase() {
  try { await sbClient.rpc('create_tables_if_not_exist'); } catch(e) {}
  const { error: e1 } = await sbClient.from('exercises').select('id').limit(1);
  if (e1 && e1.code === '42P01') throw new Error('Tables not created');
  const { data: existing } = await sbClient.from('exercises').select('id').limit(1);
  if (!existing || existing.length === 0)
    await sbClient.from('exercises').insert(DEFAULT_EXERCISES.map(e => ({ name:e.name, muscle:e.muscle, image_url:null })));
}

// ── APP ──
let currentScreen = 'home', screenStack = [], currentExercise = null;
let manageTab = 'exercises', pickerMuscleFilter = null, pickerAllExercises = [];
let calYear, calMonth;

function initApp() {
  const now = new Date();
  calYear = now.getFullYear(); calMonth = now.getMonth();
  document.getElementById('today-date').textContent = now.toLocaleDateString('ar-EG', {weekday:'long',year:'numeric',month:'long',day:'numeric'});
  loadHome();
}

function navigate(screen) {
  screenStack = [];
  showScreen(screen);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === screen));
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = {home:'🏋️ جيم تراكر',history:'📅 التقويم',templates:'📋 Templates',volume:'📈 التقدم',weight:'⚖️ وزن الجسم',manage:'⚙️ الإدارة'}[screen];
}
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  currentScreen = name;
  if (name==='home') loadHome();
  if (name==='history') loadHistory();
  if (name==='weight') loadWeightScreen();
  if (name==='volume') loadVolumeScreen();
  if (name==='templates') loadTemplatesScreen();
  if (name==='manage') loadManage();
}
function pushScreen(name, title) {
  screenStack.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  currentScreen = name;
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-title').textContent = title || '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}
function goBack() {
  if (screenStack.length > 0) {
    const prev = screenStack.pop();
    if (['home','history','weight','manage'].includes(prev)) navigate(prev);
    else {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-'+prev).classList.add('active');
      currentScreen = prev;
      if (screenStack.length === 0) document.getElementById('back-btn').style.display = 'none';
    }
  }
}

// ── HOME ──
async function loadHome() {
  const { data: exercises } = await sbClient.from('exercises').select('muscle');
  const counts = {};
  (exercises||[]).forEach(e => { counts[e.muscle] = (counts[e.muscle]||0)+1; });
  document.getElementById('muscle-grid').innerHTML = MUSCLES.map(m => `
    <div class="muscle-card" data-muscle="${m.name}" onclick="openMuscleExercises('${m.name}')">
      <div class="muscle-icon">${m.icon}</div><div class="muscle-name">${m.name}</div>
      <div class="muscle-count">${counts[m.name]||0} تمرين</div>
    </div>`).join('');

  // Weekly stats
  const { data: allSessions } = await sbClient.from('sessions').select('*').order('logged_at', {ascending:false}).limit(200);
  loadWeeklyStats(allSessions||[]);

  // Body weight
  const { data: bwData } = await sbClient.from('body_weight').select('*').order('recorded_at',{ascending:false}).limit(2);
  if (bwData && bwData.length > 0) {

      const diff = (bwData[0].weight - bwData[1].weight).toFixed(1);
      document.getElementById('bw-change').textContent = (diff>0?'+':'')+diff+' كج من آخر قياس';
      document.getElementById('bw-change').style.color = diff>0 ? '#ff5c6c' : '#34c78a';
    }
  }

  // Recent sessions
  const sessions = (allSessions||[]).slice(0, 8);
  const recentEl = document.getElementById('recent-sessions');
  if (!sessions.length) { recentEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>مفيش جلسات لسه!</p></div>'; return; }
  recentEl.innerHTML = sessions.map(s => {
    const muscle = MUSCLES.find(m => m.name===s.muscle)||{icon:'💪',color:'#888'};
    const maxW = Math.max(...(s.sets||[]).map(x=>x.weight||0));
    const date = new Date(s.logged_at).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
    return `<div class="session-card">
      <div class="session-icon" style="background:${muscle.color}22;">${muscle.icon}</div>
      <div class="session-info" onclick="openExerciseDetail('${s.exercise_id}')">

      </div>
      <button class="session-quick-log" onclick="openLogScreen('${s.exercise_id}')">➕</button>
    </div>`;
  }).join('');
}

function loadWeeklyStats(allSessions) {
  const now = new Date();
  // Start of current week from Sunday (day=0)
  const day = now.getDay(); // 0=Sun,1=Mon,...,6=Sat
  const daysBack = day; // Sunday=0 days back, Mon=1, ..., Sat=6
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - daysBack);
  weekStart.setHours(0,0,0,0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 7);

  // Compare as local date strings to avoid timezone issues
  const toLocalDate = (iso) => {
    const d = new Date(iso);
    return new Date(d.getFullYear(), d.getMonth(), d.getDate());
  };
  const thisSessions = allSessions.filter(s => {
    const d = toLocalDate(s.logged_at);
    return d >= weekStart && d < weekEnd;
  });
  const uniqueDays = new Set(thisSessions.map(s => toLocalDate(s.logged_at).toDateString())).size;
  const totalKg = thisSessions.reduce((sum,s) => sum + (s.sets||[]).reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0), 0);

  // Max weight this week
  const allWeightsThisWeek = thisSessions.flatMap(s => (s.sets||[]).map(x => x.weight||0));
  const maxWeightThisWeek = allWeightsThisWeek.length ? Math.max(...allWeightsThisWeek) : 0;

  document.getElementById('ws-days').textContent = uniqueDays;
  document.getElementById('ws-sessions').textContent = thisSessions.length;
  document.getElementById('ws-kg').textContent = maxWeightThisWeek > 0 ? maxWeightThisWeek + ' كج' : '--';

  // Streak calculation
  const allDates = [...new Set(allSessions.map(s => toLocalDate(s.logged_at).toDateString()))].map(d => new Date(d)).sort((a,b) => b-a);
  let streak = 0;
  if (allDates.length > 0) {
    const todayStr = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toDateString();
    const yesterdayStr = new Date(now.getFullYear(), now.getMonth(), now.getDate()-1).toDateString();
    // Start counting only if trained today or yesterday
    if (allDates[0].toDateString() === todayStr || allDates[0].toDateString() === yesterdayStr) {
      let checkDate = new Date(allDates[0]);
      for (let i = 0; i < allDates.length; i++) {
        if (allDates[i].toDateString() === checkDate.toDateString()) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else if (allDates[i] < checkDate) {
          break;
        }
      }
    }
  }
  const streakCard = document.getElementById('streak-card');
  const streakVal = document.getElementById('streak-val');
  if (streak > 0 && streakCard) {
    streakCard.style.display = 'flex';
    const emoji = streak >= 7 ? '🔥🔥' : streak >= 3 ? '🔥' : '✅';
    streakVal.textContent = streak + (streak === 1 ? ' يوم متتالي' : ' أيام متتالية') + ' ' + emoji;
  }

  // Best week calculation
  if (allSessions.length > 0) {
    const weekMap = {};
    allSessions.forEach(s => {
      const d = toLocalDate(s.logged_at);
      const dows = d.getDay(); // 0=Sun
      const ws = new Date(d); ws.setDate(d.getDate()-dows); ws.setHours(0,0,0,0);
      const key = ws.toISOString().split('T')[0];
      if (!weekMap[key]) weekMap[key] = { sessions:0, days:new Set(), kg:0, label: ws.toLocaleDateString('ar-EG',{month:'short',day:'numeric'}) };
      weekMap[key].sessions++;
      weekMap[key].days.add(d.toDateString());
      weekMap[key].kg += (s.sets||[]).reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0);
    });
    const best = Object.values(weekMap).sort((a,b) => b.days.size - a.days.size || b.sessions - a.sessions)[0];
    if (best && best.days.size > 0) {
      document.getElementById('best-week-card').style.display = 'flex';
      document.getElementById('best-week-val').textContent = `${best.days.size} أيام تدريب · ${best.sessions} تمرين (أسبوع ${best.label})`;
    }
  }
}

  const chartEntries=[...list].reverse().slice(-14);
  const maxW=Math.max(...chartEntries.map(e=>e.weight)), minW=Math.min(...chartEntries.map(e=>e.weight)), range=maxW-minW||1;
  const chartHtml=chartEntries.map(e=>{const h=Math.max(20,Math.round(((e.weight-minW)/range)*80+20));const d=new Date(e.recorded_at).toLocaleDateString('ar-EG',{month:'numeric',day:'numeric'});return `<div class="bw-bar-wrap"><div class="bw-bar" style="height:${h}px;"></div><div class="bw-bar-label">${e.weight}</div><div class="bw-bar-label">${d}</div></div>`;}).join('');

    ${totalChange!==null?`<div style="font-size:0.8rem;color:${totalChange>0?'var(--accent2)':'var(--green)'};">${totalChange>0?'↑ +'+totalChange:'↓ '+totalChange} كج إجمالي</div>`:''}</div>

  ${entriesHtml||'<div class="empty-state"><div class="empty-icon">⚖️</div><p>لم تسجل وزنك بعد</p></div>'}`;  setTimeout(applySwipeToHistory, 50);
}

async function loadTemplatesScreen() {
  const el = document.getElementById('templates-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const { data: templates } = await sbClient.from('templates').select('*').order('created_at', { ascending: true });
  if (!templates || templates.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>مفيش Templates لسه<br/>اضغط + إضافة Template</p></div>';
    return;
  }

  // Find suggested template based on last session
  const { data: lastSess } = await sbClient.from('sessions').select('logged_at').order('logged_at', { ascending: false }).limit(1);
  const lastDate = lastSess?.[0] ? new Date(lastSess[0].logged_at).toDateString() : null;
  const todayStr = new Date().toDateString();
  const trainedToday = lastDate === todayStr;

  // Get last used template
  const { data: lastTplSess } = await sbClient.from('sessions').select('template_id').not('template_id', 'is', null).order('logged_at', { ascending: false }).limit(1);
  const lastTplId = lastTplSess?.[0]?.template_id;
  const lastTplIdx = templates.findIndex(t => t.id === lastTplId);
  const suggestedIdx = trainedToday ? -1 : (lastTplIdx === -1 ? 0 : (lastTplIdx + 1) % templates.length);
  const suggestedId = suggestedIdx >= 0 ? templates[suggestedIdx]?.id : null;

  el.innerHTML = templates.map(t => {
    const exercises = t.exercises || [];
    const isSuggested = t.id === suggestedId;
    const chips = exercises.slice(0, 4).map(e => `<div class="template-ex-chip">${e.name}</div>`).join('') + (exercises.length > 4 ? `<div class="template-ex-chip">+${exercises.length - 4}</div>` : '');
    return `<div class="template-card ${isSuggested ? 'template-suggested' : ''}">
      ${isSuggested ? '<div class="template-suggested-badge">⚡ اليوم</div>' : ''}
      <div class="template-card-header">
        <div><div class="template-card-name">${t.name}</div><div class="template-card-count">${exercises.length} تمرين</div></div>
        <button class="icon-btn danger" onclick="deleteTemplate('${t.id}','${t.name.replace(/'/g,"\'")}')">🗑️</button>
      </div>
      <div class="template-exercises-preview">${chips || '<span style="font-size:0.78rem;color:var(--text-muted);">لا يوجد تمارين بعد</span>'}</div>
      <div class="template-actions">
        <button class="template-start-btn" onclick="startTemplate('${t.id}')">▶ ابدأ التمرين</button>
        <button class="template-edit-btn" onclick="editTemplate('${t.id}')">✏️ تعديل</button>
      </div>
    </div>`;
  }).join('');
}

  document.querySelectorAll('#tpl-muscles-filter button').forEach(b => { b.style.background='transparent'; b.style.color=b.style.borderColor||'var(--accent)'; });
  btn.style.background = btn.style.borderColor||'var(--accent)'; btn.style.color='#fff';
  filterTemplateExercises(document.getElementById('tpl-ex-search').value);
}

function filterTemplateExercises(q) {
  let list = tplMuscleFilter ? tplAllExercises.filter(e => e.muscle === tplMuscleFilter) : tplAllExercises;
  if (q) list = list.filter(e => e.name.toLowerCase().includes(q.toLowerCase()));
  renderTplExercises(list);
}

function renderTplExercises(exercises) {
  document.getElementById('tpl-exercises-list').innerHTML = exercises.map(ex => {
    const m = MUSCLES.find(x => x.name === ex.muscle) || { icon:'💪', color:'#888' };
    const thumb = ex.image_url ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:contain;background:#252930;border-radius:10px;"/>` : `<span>${m.icon}</span>`;
    return `<div class="exercise-item" onclick="addExToTemplate('${ex.id}','${ex.name.replace(/'/g,"\'")}','${ex.muscle}','${ex.image_url||''}')">
      <div class="exercise-thumb">${thumb}</div>
      <div class="exercise-info"><div class="exercise-name">${ex.name}</div><div class="exercise-last" style="color:${m.color};">${ex.muscle}</div></div>
      <div style="color:var(--accent-light);font-size:1.3rem;padding:0 6px;">+</div>
    </div>`;
  }).join('') || '<div class="empty-state"><p>لا يوجد نتايج</p></div>';
}

async function addExToTemplate(exId, exName, exMuscle, exImg) {
  const { data: tpl } = await sbClient.from('templates').select('*').eq('id', currentTemplateId).single();
  const exercises = [...(tpl.exercises || [])];
  if (exercises.find(e => e.id === exId)) { showToast('التمرين موجود بالفعل', 'error'); return; }
  exercises.push({ id: exId, name: exName, muscle: exMuscle, image_url: exImg || null });
  await sbClient.from('templates').update({ exercises }).eq('id', currentTemplateId);
  showToast('✅ تم الإضافة', 'success');
  if (currentScreen === 'template-detail') loadTemplateDetail(currentTemplateId);
}

async function startTemplate(templateId) {
  closeModal('modal-template-exercises');
  const { data: tpl } = await sbClient.from('templates').select('*').eq('id', templateId).single();
  if (!tpl.exercises || tpl.exercises.length === 0) { showToast('أضف تمارين للـ Template الأول', 'error'); return; }
  pushScreen('template-session', `▶ ${tpl.name}`);
  renderTemplateSession(tpl);
}

// Render full template session (all exercises at once)
let templateSessionData = {};
async function renderTemplateSession(tpl) {
  // Check for screen
  let el = document.getElementById('screen-template-session');
  if (!el) {
    document.getElementById('screen-detail').insertAdjacentHTML('afterend', '<div class="screen" id="screen-template-session"><div id="template-session-content"></div></div>');
    el = document.getElementById('screen-template-session');
    el.classList.add('active');
  }
  const content = document.getElementById('template-session-content');
  templateSessionData = { templateId: tpl.id, templateName: tpl.name, exercises: tpl.exercises };

  // Get last sessions for each exercise
  const ids = tpl.exercises.map(e => e.id);
  const { data: lastSessions } = await sbClient.from('sessions').select('exercise_id, sets').in('exercise_id', ids).order('logged_at', { ascending: false });
  const lastMap = {};
  (lastSessions||[]).forEach(s => { if (!lastMap[s.exercise_id]) lastMap[s.exercise_id] = s; });

  const todayStr = new Date().toISOString().split('T')[0];

  const exHtml = tpl.exercises.map((ex, idx) => {
    const last = lastMap[ex.id];
    const initSets = last?.sets?.length ? last.sets : Array(3).fill({ weight: '', reps: '' });
    const muscle = MUSCLES.find(m => m.name === ex.muscle) || { icon:'💪', color:'#888' };
    const lastInfo = last ? `آخر: ${Math.max(...(last.sets||[]).map(x=>x.weight||0))} كج` : 'جديد';
    const thumb = ex.image_url ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:contain;background:#252930;border-radius:12px;"/>` : `<span style="font-size:1.4rem;">${muscle.icon}</span>`;
    const setRows = initSets.map((s, si) => `<div class="set-row" id="tset-row-${idx}-${si+1}">
      <div class="set-num">${si+1}</div>
      <input type="number" class="set-input" id="tw-${idx}-${si+1}" value="${s.weight||''}" placeholder="0" inputmode="decimal"/>
      <input type="number" class="set-input" id="tr-${idx}-${si+1}" value="${s.reps||''}" placeholder="0" inputmode="numeric"/>
      <button class="icon-btn danger" onclick="removeTplSetRow(${idx},${si+1})">✕</button>
    </div>`).join('');
    return `<div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
        <div class="exercise-thumb">${thumb}</div>
        <div><div style="font-weight:700;font-size:0.95rem;">${ex.name}</div><div style="font-size:0.75rem;color:${muscle.color};">${ex.muscle} · ${lastInfo}</div></div>
      </div>
      <div class="set-label-row"><div></div><div class="set-label">الوزن (كج)</div><div class="set-label">التكرارات</div><div></div></div>
      <div id="tset-container-${idx}">${setRows}</div>
      <button class="add-set-btn" onclick="addTplSetRow(${idx})" style="margin-bottom:0;">+ مجموعة</button>
    </div>`;
  }).join('');

  content.innerHTML = `
    <div style="background:linear-gradient(135deg,rgba(79,142,247,0.1),rgba(79,142,247,0.05));border:1px solid rgba(79,142,247,0.2);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:0.75rem;color:var(--accent-light);font-weight:700;">📋 ${tpl.name}</div>
      <div style="font-size:0.85rem;color:var(--text-muted);margin-top:2px;">${tpl.exercises.length} تمرين</div>
    </div>
    <div class="section-title">تاريخ الجلسة</div>
    <input type="date" class="form-input" id="tpl-session-date" style="margin-bottom:16px;direction:ltr;" value="${todayStr}" />
    ${exHtml}
    <button class="btn-primary" onclick="saveTemplateSession()">💾 حفظ الجلسة كاملة</button>`;
}

let tplSetCounts = {};
function addTplSetRow(exIdx) {
  tplSetCounts[exIdx] = (tplSetCounts[exIdx] || document.querySelectorAll(`#tset-container-${exIdx} .set-row`).length) + 1;
  const num = tplSetCounts[exIdx];
  document.getElementById(`tset-container-${exIdx}`).insertAdjacentHTML('beforeend',
    `<div class="set-row" id="tset-row-${exIdx}-${num}"><div class="set-num">${num}</div><input type="number" class="set-input" id="tw-${exIdx}-${num}" placeholder="0" inputmode="decimal"/><input type="number" class="set-input" id="tr-${exIdx}-${num}" placeholder="0" inputmode="numeric"/><button class="icon-btn danger" onclick="removeTplSetRow(${exIdx},${num})">✕</button></div>`);
}
function removeTplSetRow(exIdx, num) {
  const r = document.getElementById(`tset-row-${exIdx}-${num}`);
  if (r && document.querySelectorAll(`#tset-container-${exIdx} .set-row`).length > 1) r.remove();
}

async function saveTemplateSession() {
  const dateInput = document.getElementById('tpl-session-date')?.value;
  const loggedAt = dateInput ? new Date(dateInput + 'T12:00:00').toISOString() : new Date().toISOString();
  const { exercises, templateId } = templateSessionData;
  let saved = 0;
  for (let idx = 0; idx < exercises.length; idx++) {
    const ex = exercises[idx];
    const rows = document.querySelectorAll(`#tset-container-${idx} .set-row`);
    const sets = [];
    rows.forEach(row => {
      const num = row.id.replace(`tset-row-${idx}-`, '');
      const w = parseFloat(document.getElementById(`tw-${idx}-${num}`)?.value) || 0;
      const r = parseInt(document.getElementById(`tr-${idx}-${num}`)?.value) || 0;
      if (w > 0 || r > 0) sets.push({ weight: w, reps: r });
    });
    if (sets.length === 0) continue;
    await sbClient.from('sessions').insert({ exercise_id: ex.id, exercise_name: ex.name, muscle: ex.muscle, sets, notes: '', logged_at: loggedAt, template_id: templateId });
    saved++;
  }
  if (saved === 0) { showToast('سجل وزن أو تكرارات الأول', 'error'); return; }
  showToast(`✅ تم حفظ ${saved} تمرين`, 'success');
  goBack();
}

// ── VOLUME SCREEN ──
let volTab = 'weekly';
async function loadVolumeScreen() {
  const el = document.getElementById('volume-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';
  const { data: sessions } = await sbClient.from('sessions').select('*').order('logged_at', { ascending: false }).limit(500);
  const allS = sessions || [];
  renderVolumeScreen(allS);
}

function renderVolumeScreen(allS) {
  const el = document.getElementById('volume-content');
  const toLD = iso => { const d=new Date(iso); return new Date(d.getFullYear(),d.getMonth(),d.getDate()); };

  // Group sessions by week
  const weekMap = {};
  allS.forEach(s => {
    const d = toLD(s.logged_at);
    const dow = d.getDay();
    const ws = new Date(d); ws.setDate(d.getDate() - dow);
    const key = ws.toISOString().split('T')[0];
    if (!weekMap[key]) weekMap[key] = { label: ws.toLocaleDateString('ar-EG',{month:'short',day:'numeric'}), sessions:[], volume:0, maxW:0, days:new Set() };
    weekMap[key].sessions.push(s);
    weekMap[key].volume += (s.sets||[]).reduce((a,x)=>a+(x.weight||0)*(x.reps||0),0);
    weekMap[key].maxW = Math.max(weekMap[key].maxW, ...(s.sets||[]).map(x=>x.weight||0));
    weekMap[key].days.add(d.toDateString());
  });

  const weeks = Object.entries(weekMap).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,10).reverse();

  // Weekly volume bars
  const maxVol = Math.max(...weeks.map(([,w])=>w.volume), 1);
  const volBarsHtml = weeks.length ? weeks.map(([,w]) => {
    const pct = Math.max(4, Math.round((w.volume/maxVol)*100));
    const label = w.volume > 999 ? (w.volume/1000).toFixed(1)+'k' : Math.round(w.volume);
    return `<div class="vol-week-bar-wrap">
      <div class="vol-week-label">${w.label}</div>
      <div class="vol-bar-track"><div class="vol-bar-fill" style="width:${pct}%;"><span class="vol-bar-val">${label}</span></div></div>
      <div style="font-size:0.7rem;color:var(--text-muted);width:28px;text-align:center;">${w.days.size}d</div>
    </div>`;
  }).join('') : '<div class="empty-state"><div class="empty-icon">📊</div><p>لا يوجد بيانات كافية</p></div>';

  // Muscle breakdown this month
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const thisMonth = allS.filter(s => toLD(s.logged_at) >= monthStart);
  const muscleCounts = {};
  thisMonth.forEach(s => { muscleCounts[s.muscle] = (muscleCounts[s.muscle]||0)+1; });
  const muscleHtml = MUSCLES.map(m => {
    const count = muscleCounts[m.name]||0;
    const bar = count > 0 ? `<div style="height:4px;background:${m.color};border-radius:2px;width:${Math.min(100,count*10)}%;margin-top:4px;"></div>` : '';
    return `<div class="vol-muscle-row">
      <div class="vol-muscle-icon">${m.icon}</div>
      <div class="vol-muscle-info"><div class="vol-muscle-name">${m.name}</div><div class="vol-muscle-count">${count} جلسة هذا الشهر</div>${bar}</div>
      <div style="font-size:1rem;font-weight:700;color:${m.color};">${count}</div>
    </div>`;
  }).join('');

  // Overall stats
  const totalSessions = allS.length;
  const totalDays = new Set(allS.map(s=>toLD(s.logged_at).toDateString())).size;
  const allWeights = allS.flatMap(s=>(s.sets||[]).map(x=>x.weight||0));
  const overallPR = allWeights.length ? Math.max(...allWeights) : 0;

  el.innerHTML = `
    <div class="stats-row" style="margin-bottom:20px;">
      <div class="stat-box"><div class="stat-val">${totalDays}</div><div class="stat-label">إجمالي أيام التدريب</div></div>
      <div class="stat-box"><div class="stat-val">${totalSessions}</div><div class="stat-label">إجمالي الجلسات</div></div>
      <div class="stat-box"><div class="stat-val">${overallPR}</div><div class="stat-label">أعلى وزن 🏆</div></div>
    </div>
    <div class="section-title">Volume الأسبوعي (كج × تكرارات)</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;">
      ${volBarsHtml}
    </div>
    <div class="section-title">تفصيل العضلات هذا الشهر</div>
    ${muscleHtml}`;
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),2500);}


// ── THEME ──
function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
}
function applyTheme() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') { document.body.classList.add('light'); document.getElementById('theme-toggle').textContent = '☀️'; }
}

// ── SWIPE TO DELETE ──
function makeSwipeable(el, onDelete) {
  let startX = 0, currentX = 0, isSwiping = false;
  const inner = el.querySelector('.history-item, .bw-entry');
  if (!inner) return;

  el.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isSwiping = true; }, { passive: true });
  el.addEventListener('touchmove', e => {
    if (!isSwiping) return;
    currentX = e.touches[0].clientX - startX;
    if (currentX < 0) {
      // RTL: swipe left = delete (which is right in RTL = toward start)
      inner.style.transform = `translateX(${Math.max(currentX, -80)}px)`;
    }
  }, { passive: true });
  el.addEventListener('touchend', () => {
    isSwiping = false;
    if (currentX < -50) {
      inner.classList.add('swiped');
      // auto confirm after 600ms or tap delete bg
      setTimeout(() => { if (inner.classList.contains('swiped')) onDelete(); }, 1500);
    } else {
      inner.style.transform = '';
    }
    currentX = 0;
  });
}

function applySwipeToHistory() {
  document.querySelectorAll('.swipeable').forEach(el => {
    const deleteId = el.dataset.deleteId;
    const deleteType = el.dataset.deleteType;
    if (!deleteId || el.dataset.swipeReady) return;
    el.dataset.swipeReady = '1';
    makeSwipeable(el, async () => {
      if (deleteType === 'session') {
        await sbClient.from('sessions').delete().eq('id', deleteId);
        showToast('تم الحذف', 'success');
        openExerciseDetail(currentDetailExerciseId);
      } else if (deleteType === 'weight') {
        await sbClient.from('body_weight').delete().eq('id', deleteId);
        showToast('تم الحذف', 'success');
        loadWeightScreen();
      }
    });
  });
}
