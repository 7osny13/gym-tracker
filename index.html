<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>جيم تراكر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --text-muted: #888;
    --border: #2a2a38;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Cairo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 1.15rem; font-weight: 700; }
  .header-back {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    border-radius: 10px; padding: 8px 14px;
    font-family: 'Cairo', sans-serif; font-size: 0.85rem; cursor: pointer;
  }

  /* NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(19,19,26,0.97); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex; z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 8px; cursor: pointer; color: var(--text-muted);
    font-size: 0.7rem; gap: 4px; border: none; background: none;
    font-family: 'Cairo', sans-serif; transition: all 0.2s;
  }
  .nav-item .nav-icon { font-size: 1.4rem; }
  .nav-item.active { color: var(--accent); }

  .main { padding: 16px 16px 90px; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* BUTTONS */
  .btn-primary {
    width: 100%; background: var(--accent); color: #000; border: none;
    border-radius: 12px; padding: 14px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary {
    flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 13px; font-family: 'Cairo', sans-serif; font-size: 0.9rem; cursor: pointer;
  }
  .btn-save {
    flex: 2; background: var(--accent); border: none; color: #000;
    border-radius: 12px; padding: 13px; font-family: 'Cairo', sans-serif;
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
  }
  .quick-log-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; background: var(--accent); color: #000; border: none;
    border-radius: var(--radius); padding: 16px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer; margin-bottom: 24px; transition: all 0.2s;
  }
  .quick-log-btn:active { transform: scale(0.98); }

  .section-title {
    font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
    letter-spacing: 0.08em; margin-bottom: 12px; text-transform: uppercase;
  }

  /* SEARCH BAR */
  .search-bar {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 14px; margin-bottom: 14px;
  }
  .search-bar input {
    flex: 1; background: none; border: none; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 0.9rem; outline: none;
  }
  .search-bar input::placeholder { color: var(--text-muted); }
  .search-icon { color: var(--text-muted); font-size: 1rem; }

  /* HOME */
  .greeting { margin-bottom: 20px; }
  .greeting h1 { font-size: 1.6rem; font-weight: 900; line-height: 1.2; }
  .greeting h1 span { color: var(--accent); }
  .greeting p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

  /* MUSCLE GRID */
  .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .muscle-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; cursor: pointer;
    transition: all 0.2s; position: relative; overflow: hidden;
  }
  .muscle-card::before {
    content: ''; position: absolute; top: 0; right: 0;
    width: 4px; height: 100%; border-radius: 0 var(--radius) var(--radius) 0;
  }
  .muscle-card:active { transform: scale(0.97); }
  .muscle-card .muscle-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .muscle-card .muscle-name { font-size: 0.9rem; font-weight: 700; }
  .muscle-card .muscle-count { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .muscle-card[data-muscle="أرجل"]::before { background: #ff6b35; }
  .muscle-card[data-muscle="صدر"]::before { background: #e84393; }
  .muscle-card[data-muscle="ظهر"]::before { background: #00d4aa; }
  .muscle-card[data-muscle="كتف"]::before { background: #7c4dff; }
  .muscle-card[data-muscle="بايسبس / ترايسبس"]::before { background: #ffd700; }

  /* SESSION CARD */
  .session-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s;
  }
  .session-card:active { background: var(--surface2); }
  .session-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
  .session-info { flex: 1; min-width: 0; }
  .session-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .session-weight { font-size: 1rem; font-weight: 700; color: var(--accent); white-space: nowrap; }

  /* EXERCISE ITEM */
  .exercise-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px; cursor: pointer; transition: all 0.15s;
  }
  .exercise-item:active { background: var(--surface2); }
  .exercise-thumb {
    width: 50px; height: 50px; border-radius: 12px;
    background: var(--surface2); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; overflow: hidden;
  }
  .exercise-thumb img { width: 100%; height: 100%; object-fit: contain; background: #1a1a24; }
  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name { font-size: 0.9rem; font-weight: 600; }
  .exercise-last { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .exercise-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 0.85rem; transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.danger:hover { color: var(--accent2); border-color: var(--accent2); }

  /* PR BADGE */
  .pr-badge {
    display: inline-flex; align-items: center; gap: 3px;
    background: rgba(232,255,71,0.12); color: var(--accent);
    border: 1px solid rgba(232,255,71,0.3);
    border-radius: 6px; padding: 2px 6px;
    font-size: 0.7rem; font-weight: 700;
  }

  /* COMPARISON ARROW */
  .compare-up { color: #00d4aa; font-weight: 700; font-size: 0.8rem; }
  .compare-down { color: #ff4757; font-weight: 700; font-size: 0.8rem; }
  .compare-same { color: var(--text-muted); font-size: 0.8rem; }

  /* LOG */
  .log-header {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .log-exercise-thumb {
    width: 64px; height: 64px; border-radius: 12px;
    background: var(--surface2); display: flex; align-items: center;
    justify-content: center; font-size: 1.8rem; overflow: hidden; flex-shrink: 0;
  }
  .log-exercise-thumb img { width: 100%; height: 100%; object-fit: contain; background: #1a1a24; }
  .prev-record {
    background: var(--surface2); border-radius: 12px; padding: 12px 16px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
  }
  .prev-record .label { font-size: 0.78rem; color: var(--text-muted); }
  .prev-record .value { font-size: 0.9rem; font-weight: 700; color: var(--accent); }

  .sets-container { margin-bottom: 20px; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; }
  .set-num { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-align: center; }
  .set-input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 10px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 1rem; font-weight: 600;
    text-align: center; width: 100%;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .set-label-row { display: grid; grid-template-columns: 28px 1fr 1fr auto; gap: 8px; margin-bottom: 6px; }
  .set-label { font-size: 0.72rem; color: var(--text-muted); text-align: center; }
  .add-set-btn {
    width: 100%; background: transparent; border: 1px dashed var(--border);
    border-radius: 10px; padding: 12px; color: var(--text-muted);
    font-family: 'Cairo', sans-serif; font-size: 0.85rem; cursor: pointer; margin-bottom: 16px; transition: all 0.2s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }
  .notes-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 0.9rem; margin-bottom: 16px; resize: none; height: 70px;
  }
  .notes-input:focus { outline: none; border-color: var(--accent); }

  /* HISTORY */
  .history-date-group { margin-bottom: 20px; }
  .history-date { font-size: 0.75rem; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; padding-right: 4px; }
  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; margin-bottom: 6px; }
  .history-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .history-item-name { font-size: 0.88rem; font-weight: 600; }
  .history-item-muscle { font-size: 0.72rem; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .history-sets-grid { display: flex; gap: 6px; flex-wrap: wrap; }
  .history-set-chip { background: var(--surface2); border-radius: 8px; padding: 4px 8px; font-size: 0.75rem; color: var(--text-muted); }
  .history-set-chip span { color: var(--text); font-weight: 600; }

  /* CALENDAR */
  .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .calendar-month { font-size: 1rem; font-weight: 700; }
  .cal-nav { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1rem; }
  .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 20px; }
  .cal-day-name { font-size: 0.65rem; color: var(--text-muted); text-align: center; padding: 4px 0; font-weight: 700; }
  .cal-day {
    aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; color: var(--text-muted); cursor: default;
  }
  .cal-day.has-session { background: rgba(232,255,71,0.15); color: var(--accent); font-weight: 700; border: 1px solid rgba(232,255,71,0.3); cursor: pointer; }
  .cal-day.today { border: 1px solid var(--accent); color: var(--accent); }
  .cal-day.today.has-session { background: rgba(232,255,71,0.25); }
  .cal-day.empty { opacity: 0; pointer-events: none; }
  .cal-stats { display: flex; gap: 10px; margin-bottom: 20px; }
  .cal-stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
  .cal-stat .val { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  .cal-stat .lbl { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  /* MANAGE */
  .manage-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .manage-tab {
    flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    border-radius: 10px; padding: 10px; font-family: 'Cairo', sans-serif; font-size: 0.85rem;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .manage-tab.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  /* DETAIL */
  .exercise-detail-img {
    width: 100%; height: 220px; border-radius: var(--radius); margin-bottom: 16px;
    background: var(--surface); display: flex; align-items: center; justify-content: center;
    font-size: 4rem; overflow: hidden;
  }
  .exercise-detail-img img { width: 100%; height: 100%; object-fit: contain; background: #13131a; }
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
  .stat-box .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-box .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 500; display: none;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0; padding: 24px 20px;
    width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
  .modal-drag { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 0.9rem;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: var(--surface); }
  .image-upload-area {
    border: 2px dashed var(--border); border-radius: 12px; padding: 20px;
    text-align: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
  }
  .image-upload-area:hover { border-color: var(--accent); }
  .image-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .preview-img { width: 100%; height: 140px; object-fit: contain; border-radius: 8px; margin-top: 10px; background: var(--bg); }
  .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.82rem; color: var(--text-muted); }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 20px; font-size: 0.85rem;
    z-index: 999; opacity: 0; transition: all 0.3s; white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* LOADER */
  .loader { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); font-size: 0.9rem; gap: 10px; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; }
</style>
</head>
<body>

<div id="app">
  <div class="app-header">
    <div class="header-title" id="header-title">🏋️ جيم تراكر</div>
    <div>
      <button class="header-back" id="back-btn" style="display:none;" onclick="goBack()">→ رجوع</button>
    </div>
  </div>

  <div class="main">

    <!-- HOME -->
    <div class="screen active" id="screen-home">
      <div class="greeting">
        <h1>يلا <span>نتدرب 💪</span></h1>
        <p id="today-date"></p>
      </div>
      <button class="quick-log-btn" onclick="showExercisePicker()">
        <span style="font-size:1.3rem">+</span><span>تسجيل تمرين</span>
      </button>
      <div class="section-title">عضلات</div>
      <div class="muscle-grid" id="muscle-grid"><div class="loader"><div class="spinner"></div></div></div>
      <div class="section-title">آخر جلسات</div>
      <div id="recent-sessions"><div class="loader"><div class="spinner"></div></div></div>
    </div>

    <!-- EXERCISE LIST -->
    <div class="screen" id="screen-exercises">
      <div id="exercise-list-content"></div>
    </div>

    <!-- LOG -->
    <div class="screen" id="screen-log">
      <div id="log-content"></div>
    </div>

    <!-- HISTORY -->
    <div class="screen" id="screen-history">
      <div id="history-content"></div>
    </div>

    <!-- MANAGE -->
    <div class="screen" id="screen-manage">
      <div class="manage-tabs">
        <button class="manage-tab active" onclick="switchManageTab('exercises')">التمارين</button>
        <button class="manage-tab" onclick="switchManageTab('muscles')">المجموعات</button>
      </div>
      <div id="manage-content"><div class="loader"><div class="spinner"></div></div></div>
      <button class="quick-log-btn" id="manage-add-btn" onclick="openAddModal()" style="margin-top:16px;">+ إضافة تمرين</button>
    </div>

    <!-- DETAIL -->
    <div class="screen" id="screen-detail">
      <div id="detail-content"></div>
    </div>

  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="navigate('home')" data-nav="home">
      <span class="nav-icon">🏠</span><span>الرئيسية</span>
    </button>
    <button class="nav-item" onclick="navigate('history')" data-nav="history">
      <span class="nav-icon">📅</span><span>التقويم</span>
    </button>
    <button class="nav-item" onclick="navigate('manage')" data-nav="manage">
      <span class="nav-icon">⚙️</span><span>إدارة</span>
    </button>
  </nav>
</div>

<!-- PICKER MODAL -->
<div class="modal-overlay" id="modal-picker">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title">اختار التمرين</div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="picker-search" placeholder="ابحث عن تمرين..." oninput="onPickerSearch(this.value)" />
    </div>
    <div id="picker-muscles" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>
    <div id="picker-list"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modal-exercise">
  <div class="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modal-exercise-title">إضافة تمرين</div>
    <div class="form-group">
      <label class="form-label">اسم التمرين</label>
      <input type="text" class="form-input" id="ex-name" placeholder="مثال: Bench Press" />
    </div>
    <div class="form-group">
      <label class="form-label">المجموعة العضلية</label>
      <select class="form-select" id="ex-muscle"></select>
    </div>
    <div class="form-group">
      <label class="form-label">صورة التمرين</label>
      <div class="image-upload-area">
        <input type="file" accept="image/*" id="ex-image" onchange="previewImage(this)" />
        <div class="upload-icon">📷</div>
        <div class="upload-text">اضغط لرفع صورة</div>
        <img id="img-preview" class="preview-img" style="display:none;" />
      </div>
    </div>
    <input type="hidden" id="ex-id" />
    <input type="hidden" id="ex-current-img" />
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal('modal-exercise')">إلغاء</button>
      <button class="btn-save" onclick="saveExercise()">حفظ</button>

function initApp() {
  const now = new Date();

  calMonth = now.getMonth();
  document.getElementById('today-date').textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  loadHome();
}

function navigate(screen) {
  screenStack = [];
  showScreen(screen);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav === screen));
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = { home: '🏋️ جيم تراكر', history: '📅 التقويم', manage: '⚙️ الإدارة' }[screen];
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  if (name === 'home') loadHome();
  if (name === 'history') loadHistory();
  if (name === 'manage') loadManage();
}

function pushScreen(name, title) {
  screenStack.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-title').textContent = title || '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function goBack() {
  if (screenStack.length > 0) {
    const prev = screenStack.pop();
    if (['home','history','manage'].includes(prev)) navigate(prev);
    else {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + prev).classList.add('active');
      currentScreen = prev;
      if (screenStack.length === 0) document.getElementById('back-btn').style.display = 'none';
    }
  }
}

async function openMuscleExercises(muscle) {
  const m = MUSCLES.find(x => x.name === muscle);
  pushScreen('exercises', `${m?.icon||''} ${muscle}`);
  const el = document.getElementById('exercise-list-content');
  el.innerHTML = `<div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="ابحث في التمارين..." oninput="filterExerciseList(this.value)" id="ex-list-search"/></div><div id="ex-list-items"><div class="loader"><div class="spinner"></div></div></div>`;

  const { data: allEx } = await sbClient.from('exercises').select('*').eq('muscle', muscle).order('name');
  const ids = (allEx||[]).map(e => e.id);
  let lastMap = {};
  if (ids.length > 0) {
    const { data: lastSessions } = await sbClient.from('sessions').select('exercise_id, sets, logged_at').in('exercise_id', ids).order('logged_at', { ascending: false });
    (lastSessions||[]).forEach(s => { if (!lastMap[s.exercise_id]) lastMap[s.exercise_id] = s; });
  }

  // Get all sessions to find PRs
  let prMap = {};
  if (ids.length > 0) {
    const { data: allSess } = await sbClient.from('sessions').select('exercise_id, sets').in('exercise_id', ids);
    (allSess||[]).forEach(s => {
      const w = Math.max(...(s.sets||[]).map(x => x.weight||0));
      if (!prMap[s.exercise_id] || w > prMap[s.exercise_id]) prMap[s.exercise_id] = w;
    });
  }

  window._exListData = { exercises: allEx||[], lastMap, prMap };
  renderExerciseList(allEx||[], lastMap, prMap);
}

function filterExerciseList(q) {
  if (!window._exListData) return;
  const { exercises, lastMap, prMap } = window._exListData;
  const filtered = q ? exercises.filter(e => e.name.toLowerCase().includes(q.toLowerCase())) : exercises;
  renderExerciseList(filtered, lastMap, prMap);
}

function renderExerciseList(exercises, lastMap, prMap) {
  const el = document.getElementById('ex-list-items');
  if (!exercises.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>مفيش نتايج</p></div>'; return; }
  el.innerHTML = exercises.map(ex => {
    const last = lastMap[ex.id];
    const lastW = last ? Math.max(...(last.sets||[]).map(x=>x.weight||0)) : 0;
    const pr = prMap[ex.id] || 0;
    const lastText = last ? `آخر: ${lastW} كج · ${new Date(last.logged_at).toLocaleDateString('ar-EG',{month:'short',day:'numeric'})}` : 'لم يُسجَّل بعد';
    const prBadge = pr > 0 ? `<span class="pr-badge">🏆 ${pr} كج</span>` : '';
    const thumb = ex.image_url ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:contain;background:#1a1a24;border-radius:12px;" />` : getMuscleIcon(ex.muscle);
    return `<div class="exercise-item">
      <div class="exercise-thumb" onclick="openExerciseDetail('${ex.id}')">${thumb}</div>
      <div class="exercise-info" onclick="openExerciseDetail('${ex.id}')">
        <div class="exercise-name">${ex.name} ${prBadge}</div>
        <div class="exercise-last">${lastText}</div>
      </div>
      <div class="exercise-actions"><button class="icon-btn" onclick="openLogScreen('${ex.id}')">➕</button></div>
    </div>`;
  }).join('');
}

function getMuscleIcon(muscle) {
  const m = MUSCLES.find(x => x.name === muscle);
  return `<span style="font-size:1.4rem;">${m?.icon||'💪'}</span>`;
}

function buildSetRow(num, weight, reps) {
  return `<div class="set-row" id="set-row-${num}">

    <input type="number" class="set-input" id="w-${num}" value="${weight}" placeholder="0" inputmode="decimal" />
    <input type="number" class="set-input" id="r-${num}" value="${reps}" placeholder="0" inputmode="numeric" />
    <button class="icon-btn danger" onclick="removeSetRow(${num})">✕</button>
  </div>`;
}

function addSetRow() {
  setCount++;
  document.getElementById('sets-rows').insertAdjacentHTML('beforeend', buildSetRow(setCount, '', ''));
}
function removeSetRow(num) {
  const row = document.getElementById('set-row-' + num);
  if (row && document.querySelectorAll('.set-row').length > 1) row.remove();
}

async function saveSession() {
  const rows = document.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach(row => {
    const num = row.id.replace('set-row-','');
    sets.push({ weight: parseFloat(document.getElementById('w-'+num)?.value)||0, reps: parseInt(document.getElementById('r-'+num)?.value)||0 });

  const notes = document.getElementById('session-notes')?.value || '';
  const dateInput = document.getElementById('session-date')?.value;
  const loggedAt = dateInput ? new Date(dateInput + 'T12:00:00').toISOString() : new Date().toISOString();

  showToast('✅ تم الحفظ', 'success');
  goBack();
}

// ── HISTORY / CALENDAR ─────────────────────────────────
async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  const { data: sessions } = await sbClient.from('sessions').select('*').order('logged_at', { ascending: false }).limit(200);
  renderCalendar(sessions||[]);
}

function renderCalendar(sessions) {
  const el = document.getElementById('history-content');
  const now = new Date();

  // Build set of dates with sessions
  const sessionDates = {};
  (sessions||[]).forEach(s => {
    const d = new Date(s.logged_at);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
    if (!sessionDates[key]) sessionDates[key] = [];
    sessionDates[key].push(s);
  });

  // Calendar for calYear/calMonth
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const monthName = new Date(calYear, calMonth, 1).toLocaleDateString('ar-EG', { month: 'long', year: 'numeric' });

  // Stats for this month
  const thisMonthSessions = sessions.filter(s => { const d = new Date(s.logged_at); return d.getMonth()===calMonth && d.getFullYear()===calYear; });
  const uniqueDays = new Set(thisMonthSessions.map(s => new Date(s.logged_at).getDate())).size;
  const totalEx = thisMonthSessions.length;

  // Day names (Arabic, Sunday first)
  const dayNames = ['أح','إث','ثل','أر','خم','جم','سب'];

  let calCells = '';
  // Offset
  for (let i=0; i<firstDay; i++) calCells += `<div class="cal-day empty"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const key = `${calYear}-${calMonth}-${d}`;
    const hasSess = !!sessionDates[key];
    const isToday = calYear===now.getFullYear() && calMonth===now.getMonth() && d===now.getDate();
    const classes = ['cal-day', hasSess?'has-session':'', isToday?'today':''].filter(Boolean).join(' ');
    const onclick = hasSess ? `onclick="showDaySessions('${key}')"` : '';
    calCells += `<div class="${classes}" ${onclick}>${d}</div>`;
  }

  // Recent sessions grouped
  const groups = {};
  (sessions||[]).slice(0,60).forEach(s => {
    const d = new Date(s.logged_at).toLocaleDateString('ar-EG',{weekday:'short',month:'short',day:'numeric'});
    if (!groups[d]) groups[d] = [];
    groups[d].push(s);
  });

  const histHtml = Object.entries(groups).map(([date, items]) => {
    const itemsHtml = items.map(s => {
      const muscle = MUSCLES.find(m => m.name === s.muscle) || { icon: '💪', color: '#888' };
      const chips = (s.sets||[]).map((x,i) => `<div class="history-set-chip">م${i+1}: <span>${x.weight}كج×${x.reps}</span></div>`).join('');
      return `<div class="history-item" onclick="openExerciseDetail('${s.exercise_id}')">
        <div class="history-item-header">
          <div class="history-item-name">${s.exercise_name}</div>
          <span class="history-item-muscle" style="background:${muscle.color}22;color:${muscle.color};">${muscle.icon} ${s.muscle}</span>
        </div>
        <div class="history-sets-grid">${chips}</div>
      </div>`;
    }).join('');
    return `<div class="history-date-group"><div class="history-date">${date}</div>${itemsHtml}</div>`;
  }).join('');

  el.innerHTML = `
    <div class="calendar-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="calendar-month">${monthName}</div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-stats">
      <div class="cal-stat"><div class="val">${uniqueDays}</div><div class="lbl">أيام تدريب</div></div>
      <div class="cal-stat"><div class="val">${totalEx}</div><div class="lbl">تمرين مسجل</div></div>
      <div class="cal-stat"><div class="val">${daysInMonth - uniqueDays}</div><div class="lbl">يوم راحة</div></div>
    </div>
    <div class="calendar-grid">
      ${dayNames.map(d=>`<div class="cal-day-name">${d}</div>`).join('')}
      ${calCells}
    </div>
    <div class="section-title">السجل التفصيلي</div>
    ${histHtml || '<div class="empty-state"><div class="empty-icon">📅</div><p>لا يوجد تدريبات بعد</p></div>'}`;
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0) { calMonth = 11; calYear--; }
  loadHistory();
}

function showDaySessions(key) {
  // Scroll to that day's sessions in the list
  const [y, m, d] = key.split('-');
  const date = new Date(parseInt(y), parseInt(m), parseInt(d));
  const label = date.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  // highlight in list - just show toast for now
  showToast('📅 ' + label, 'success');
}

// ── MANAGE ─────────────────────────────────────────────
async function loadManage() { await loadManageContent(); }

function switchManageTab(tab) {
  manageTab = tab;
  document.querySelectorAll('.manage-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='exercises')||(i===1&&tab==='muscles')));
  document.getElementById('manage-add-btn').style.display = tab === 'exercises' ? 'flex' : 'none';
  loadManageContent();
}

async function loadManageContent() {
  const el = document.getElementById('manage-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  if (manageTab === 'muscles') {
    const { data: exercises } = await sbClient.from('exercises').select('muscle');
    const counts = {};
    (exercises||[]).forEach(e => { counts[e.muscle] = (counts[e.muscle]||0)+1; });
    el.innerHTML = MUSCLES.map(m => `<div class="exercise-item">
      <div class="exercise-thumb" style="background:${m.color}22;font-size:1.4rem;display:flex;align-items:center;justify-content:center;">${m.icon}</div>
      <div class="exercise-info"><div class="exercise-name">${m.name}</div><div class="exercise-last">${counts[m.name]||0} تمرين</div></div>
    </div>`).join('');
    return;
  }

  const el2 = document.getElementById('manage-content');
  el2.innerHTML = `<div class="search-bar"><span class="search-icon">🔍</span><input type="text" placeholder="ابحث..." oninput="filterManageList(this.value)" id="manage-search"/></div><div id="manage-items"><div class="loader"><div class="spinner"></div></div></div>`;

  const { data: exercises } = await sbClient.from('exercises').select('*').order('muscle').order('name');
  window._manageExercises = exercises || [];
  renderManageList(exercises||[]);
}

function filterManageList(q) {
  if (!window._manageExercises) return;
  const filtered = q ? window._manageExercises.filter(e => e.name.toLowerCase().includes(q.toLowerCase())) : window._manageExercises;
  renderManageList(filtered);
}

function renderManageList(exercises) {
  const el = document.getElementById('manage-items');
  if (!el) return;
  if (!exercises.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏋️</div><p>لا يوجد تمارين</p></div>'; return; }
  el.innerHTML = exercises.map(ex => {
    const muscle = MUSCLES.find(m => m.name === ex.muscle) || { icon: '💪', color: '#888' };
    const thumb = ex.image_url ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:contain;background:#1a1a24;border-radius:12px;" />` : `<span style="font-size:1.4rem;">${muscle.icon}</span>`;
    return `<div class="exercise-item">
      <div class="exercise-thumb">${thumb}</div>
      <div class="exercise-info"><div class="exercise-name">${ex.name}</div><div class="exercise-last" style="color:${muscle.color};">${ex.muscle}</div></div>
      <div class="exercise-actions">
        <button class="icon-btn" onclick="openEditModal('${ex.id}')">✏️</button>
        <button class="icon-btn danger" onclick="deleteExercise('${ex.id}','${ex.name.replace(/'/g,"\\'")}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ── PICKER MODAL ───────────────────────────────────────
async function showExercisePicker() {
  const modal = document.getElementById('modal-picker');
  modal.classList.add('open');
  modal.onclick = e => { if (e.target === modal) closeModal('modal-picker'); };
  document.getElementById('picker-search').value = '';
  pickerMuscleFilter = null;

  const muscleEl = document.getElementById('picker-muscles');
  muscleEl.innerHTML = `<button style="padding:6px 12px;border-radius:20px;font-family:Cairo,sans-serif;font-size:0.8rem;border:1px solid var(--accent);background:var(--accent);color:#000;cursor:pointer;font-weight:700;" onclick="setPickerMuscle(null,this)">الكل</button>` +
    MUSCLES.map(m => `<button style="padding:6px 12px;border-radius:20px;font-family:Cairo,sans-serif;font-size:0.8rem;border:1px solid ${m.color};background:transparent;color:${m.color};cursor:pointer;" onclick="setPickerMuscle('${m.name}',this)">${m.icon} ${m.name}</button>`).join('');

  const { data: exercises } = await sbClient.from('exercises').select('*').order('name');
  pickerAllExercises = exercises || [];
  renderPickerList(pickerAllExercises);
}

function setPickerMuscle(muscle, btn) {
  pickerMuscleFilter = muscle;
  document.querySelectorAll('#picker-muscles button').forEach(b => {
    b.style.background = 'transparent'; b.style.color = b.style.borderColor||'var(--accent)'; b.style.fontWeight='400';
  });
  btn.style.background = btn.style.borderColor||'var(--accent)'; btn.style.color='#000'; btn.style.fontWeight='700';
  const q = document.getElementById('picker-search').value;
  onPickerSearch(q);
}

function onPickerSearch(q) {
  let filtered = pickerMuscleFilter ? pickerAllExercises.filter(e => e.muscle === pickerMuscleFilter) : pickerAllExercises;
  if (q) filtered = filtered.filter(e => e.name.toLowerCase().includes(q.toLowerCase()));
  renderPickerList(filtered);
}

function renderPickerList(exercises) {
  document.getElementById('picker-list').innerHTML = exercises.map(ex => {
    const m = MUSCLES.find(x => x.name === ex.muscle) || { icon: '💪', color: '#888' };
    const thumb = ex.image_url ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:contain;background:#1a1a24;border-radius:10px;" />` : `<span>${m.icon}</span>`;
    return `<div class="exercise-item" onclick="openLogScreen('${ex.id}')">
      <div class="exercise-thumb">${thumb}</div>
      <div class="exercise-info"><div class="exercise-name">${ex.name}</div><div class="exercise-last" style="color:${m.color};">${ex.muscle}</div></div>
      <div style="color:var(--accent);font-size:1.3rem;padding:0 6px;">+</div>
    </div>`;
  }).join('') || '<div class="empty-state"><p>لا يوجد نتايج</p></div>';
}

// ── ADD/EDIT EXERCISE ──────────────────────────────────
function populateMuscleSelect() {
  document.getElementById('ex-muscle').innerHTML = MUSCLES.map(m => `<option value="${m.name}">${m.icon} ${m.name}</option>`).join('');
}

function openAddModal() {
  populateMuscleSelect();
  document.getElementById('modal-exercise-title').textContent = 'إضافة تمرين';
  document.getElementById('ex-id').value = '';
  document.getElementById('ex-name').value = '';
  document.getElementById('ex-current-img').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('ex-image').value = '';
  document.getElementById('modal-exercise').classList.add('open');
  document.getElementById('modal-exercise').onclick = e => { if (e.target === document.getElementById('modal-exercise')) closeModal('modal-exercise'); };
}

async function openEditModal(id) {
  populateMuscleSelect();
  const { data: ex } = await sbClient.from('exercises').select('*').eq('id', id).single();
  document.getElementById('modal-exercise-title').textContent = 'تعديل تمرين';
  document.getElementById('ex-id').value = ex.id;
  document.getElementById('ex-name').value = ex.name;
  document.getElementById('ex-muscle').value = ex.muscle;
  document.getElementById('ex-current-img').value = ex.image_url || '';
  document.getElementById('ex-image').value = '';
  if (ex.image_url) { document.getElementById('img-preview').src = ex.image_url; document.getElementById('img-preview').style.display = 'block'; }
  else { document.getElementById('img-preview').style.display = 'none'; }
  document.getElementById('modal-exercise').classList.add('open');
  document.getElementById('modal-exercise').onclick = e => { if (e.target === document.getElementById('modal-exercise')) closeModal('modal-exercise'); };
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => { const img = document.getElementById('img-preview'); img.src = e.target.result; img.style.display = 'block'; };
  reader.readAsDataURL(file);
}

async function saveExercise() {
  const id = document.getElementById('ex-id').value;
  const name = document.getElementById('ex-name').value.trim();
  const muscle = document.getElementById('ex-muscle').value;
  const fileInput = document.getElementById('ex-image');
  const currentImg = document.getElementById('ex-current-img').value;
  if (!name) { showToast('ادخل اسم التمرين', 'error'); return; }

  let imageUrl = currentImg || null;
  if (fileInput.files[0]) {
    const file = fileInput.files[0];
    const ext = file.name.split('.').pop();
    const fileName = `${Date.now()}.${ext}`;
    const { error: upErr } = await sbClient.storage.from('gym-images').upload(fileName, file, { upsert: true });
    if (!upErr) {
      const { data: urlData } = sbClient.storage.from('gym-images').getPublicUrl(fileName);
      imageUrl = urlData.publicUrl;
    }
  }

  if (id) {
    const { error } = await sbClient.from('exercises').update({ name, muscle, image_url: imageUrl }).eq('id', id);
    if (error) { showToast('❌ ' + error.message, 'error'); return; }
    showToast('✅ تم التعديل', 'success');
  } else {
    const { error } = await sbClient.from('exercises').insert({ name, muscle, image_url: imageUrl });
    if (error) { showToast('❌ ' + error.message, 'error'); return; }
    showToast('✅ تم الإضافة', 'success');
  }
  closeModal('modal-exercise');
  loadManageContent();
}

async function deleteExercise(id, name) {
  if (!confirm(`هتحذف "${name}"؟`)) return;
  await sbClient.from('exercises').delete().eq('id', id);
  showToast('تم الحذف', 'success');
  loadManageContent();
}

// ── UTILS ──────────────────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── START ──────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  initSupabase(SUPABASE_URL, SUPABASE_KEY);
});
</script>
