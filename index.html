<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>جيم تراكر</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #f0f0f0;
    --text-muted: #888;
    --border: #2a2a38;
    --radius: 16px;
    --muscle-legs: #ff6b35;
    --muscle-chest: #e84393;
    --muscle-back: #00d4aa;
    --muscle-shoulder: #7c4dff;
    --muscle-arms: #ffd700;
    --muscle-cardio: #00bcd4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ======= CONFIG SCREEN ======= */
  #config-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    padding: 24px;
  }
  .config-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px 24px;
    width: 100%;
    max-width: 420px;
  }
  .config-box .logo { font-size: 2.5rem; text-align: center; margin-bottom: 8px; }
  .config-box h2 { text-align: center; font-size: 1.3rem; margin-bottom: 6px; color: var(--accent); }
  .config-box p { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-bottom: 28px; line-height: 1.6; }
  .config-box label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
  .config-box input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 16px;
    direction: ltr;
  }
  .config-box input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(232,255,71,0.3); }
  .config-steps { margin-bottom: 24px; }
  .config-step {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--surface2);
    border-radius: 10px;
    padding: 10px 12px;
    margin-bottom: 8px;
    font-size: 0.82rem;
    color: var(--text-muted);
  }
  .step-num {
    background: var(--accent);
    color: #000;
    border-radius: 50%;
    width: 20px; height: 20px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.75rem;
    flex-shrink: 0; margin-top: 1px;
  }

  /* ======= HEADER ======= */
  .app-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 1.15rem; font-weight: 700; }
  .header-back {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 8px 14px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .header-actions { display: flex; gap: 8px; }

  /* ======= NAV ======= */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(19,19,26,0.97);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
    padding: 10px 0 8px;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text-muted);
    font-size: 0.7rem;
    gap: 4px;
    border: none; background: none; font-family: 'Cairo', sans-serif;
  }
  .nav-item .nav-icon { font-size: 1.4rem; }
  .nav-item.active { color: var(--accent); }

  /* ======= MAIN CONTENT ======= */
  .main { padding: 16px 16px 90px; }

  /* ======= SCREENS ======= */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ======= HOME SCREEN ======= */
  .greeting { margin-bottom: 20px; }
  .greeting h1 { font-size: 1.6rem; font-weight: 900; line-height: 1.2; }
  .greeting h1 span { color: var(--accent); }
  .greeting p { color: var(--text-muted); font-size: 0.85rem; margin-top: 4px; }

  .quick-log-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 24px;
    transition: all 0.2s;
  }
  .quick-log-btn:active { transform: scale(0.98); }

  .section-title {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  /* MUSCLE GROUPS */
  .muscle-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .muscle-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .muscle-card::before {
    content: '';
    position: absolute; top: 0; right: 0;
    width: 4px; height: 100%;
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .muscle-card:active { transform: scale(0.97); }
  .muscle-card .muscle-icon { font-size: 1.8rem; margin-bottom: 6px; }
  .muscle-card .muscle-name { font-size: 0.9rem; font-weight: 700; }
  .muscle-card .muscle-count { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

  .muscle-card[data-muscle="أرجل"]::before { background: var(--muscle-legs); }
  .muscle-card[data-muscle="صدر"]::before { background: var(--muscle-chest); }
  .muscle-card[data-muscle="ظهر"]::before { background: var(--muscle-back); }
  .muscle-card[data-muscle="كتف"]::before { background: var(--muscle-shoulder); }
  .muscle-card[data-muscle="بايسبس / ترايسبس"]::before { background: var(--muscle-arms); }

  /* RECENT SESSIONS */
  .session-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .session-card:active { background: var(--surface2); }
  .session-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
  }
  .session-info { flex: 1; min-width: 0; }
  .session-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .session-meta { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
  .session-weight {
    font-size: 1rem; font-weight: 700;
    color: var(--accent);
    white-space: nowrap;
  }

  /* ======= EXERCISE LIST SCREEN ======= */
  .exercise-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
  }
  .exercise-item:active { background: var(--surface2); }
  .exercise-thumb {
    width: 50px; height: 50px;
    border-radius: 12px;
    object-fit: cover;
    background: var(--surface2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    overflow: hidden;
  }
  .exercise-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .exercise-info { flex: 1; min-width: 0; }
  .exercise-name { font-size: 0.9rem; font-weight: 600; }
  .exercise-last { font-size: 0.75rem; color: var(--text-muted); margin-top: 3px; }
  .exercise-actions {
    display: flex; gap: 6px;
  }
  .icon-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn.danger:hover { color: var(--accent2); border-color: var(--accent2); }

  /* ======= LOG SESSION SCREEN ======= */
  .log-header {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .log-exercise-thumb {
    width: 56px; height: 56px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    overflow: hidden;
    flex-shrink: 0;
  }
  .log-exercise-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .prev-record {
    background: var(--surface2);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .prev-record .label { font-size: 0.78rem; color: var(--text-muted); }
  .prev-record .value { font-size: 0.9rem; font-weight: 700; color: var(--accent); }

  .sets-container { margin-bottom: 20px; }
  .set-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .set-num {
    font-size: 0.8rem;
    color: var(--text-muted);
    font-weight: 700;
    text-align: center;
  }
  .set-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 10px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    text-align: center;
    width: 100%;
  }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--text-muted); font-weight: 400; }
  .set-label-row {
    display: grid;
    grid-template-columns: 28px 1fr 1fr auto;
    gap: 8px;
    margin-bottom: 6px;
  }
  .set-label {
    font-size: 0.72rem;
    color: var(--text-muted);
    text-align: center;
  }
  .add-set-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text-muted);
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    margin-bottom: 16px;
    transition: all 0.2s;
  }
  .add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

  .notes-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    margin-bottom: 16px;
    resize: none;
    height: 70px;
  }
  .notes-input:focus { outline: none; border-color: var(--accent); }

  /* ======= HISTORY SCREEN ======= */
  .history-date-group { margin-bottom: 20px; }
  .history-date {
    font-size: 0.75rem;
    color: var(--text-muted);
    font-weight: 700;
    margin-bottom: 8px;
    padding-right: 4px;
  }
  .history-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 6px;
  }
  .history-item-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .history-item-name { font-size: 0.88rem; font-weight: 600; }
  .history-item-muscle {
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 600;
  }
  .history-sets-grid {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .history-set-chip {
    background: var(--surface2);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .history-set-chip span { color: var(--text); font-weight: 600; }

  /* ======= MANAGE SCREEN ======= */
  .manage-tabs {
    display: flex; gap: 8px;
    margin-bottom: 16px;
  }
  .manage-tab {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 10px;
    padding: 10px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .manage-tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  /* ======= MODAL ======= */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; }
  .modal-drag {
    width: 40px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
  }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
  .form-select option { background: var(--surface); }

  .image-upload-area {
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .image-upload-area:hover { border-color: var(--accent); }
  .image-upload-area input[type="file"] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer;
  }
  .image-upload-area .preview-img {
    width: 100%; height: 120px;
    object-fit: cover;
    border-radius: 8px;
    margin-top: 10px;
  }
  .upload-icon { font-size: 2rem; margin-bottom: 6px; }
  .upload-text { font-size: 0.82rem; color: var(--text-muted); }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-secondary {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 13px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    cursor: pointer;
  }
  .btn-save {
    flex: 2;
    background: var(--accent);
    border: none;
    color: #000;
    border-radius: 12px;
    padding: 13px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-save:active { transform: scale(0.98); }

  /* ======= EXERCISE DETAIL SCREEN ======= */
  .exercise-detail-img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: var(--radius);
    margin-bottom: 16px;
    background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 4rem;
    overflow: hidden;
  }
  .exercise-detail-img img { width: 100%; height: 100%; object-fit: cover; }
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 20px;
  }
  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    text-align: center;
  }
  .stat-box .stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .stat-box .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }

  /* ======= TOAST ======= */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 0.85rem;
    z-index: 999;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: var(--accent); color: var(--accent); }
  .toast.error { border-color: var(--accent2); color: var(--accent2); }

  /* ======= LOADING ======= */
  .loader {
    display: flex; align-items: center; justify-content: center;
    padding: 40px;
    color: var(--text-muted);
    font-size: 0.9rem;
    gap: 10px;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 3rem; margin-bottom: 10px; }
  .empty-state p { font-size: 0.88rem; }

  /* color dots */
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-left: 6px; }
</style>
</head>
<body>

<!-- MAIN APP -->
<div id="app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="header-title" id="header-title">🏋️ جيم تراكر</div>
    <div class="header-actions">
      <button class="header-back" id="back-btn" style="display:none;" onclick="goBack()">→ رجوع</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <!-- HOME SCREEN -->
    <div class="screen active" id="screen-home">
      <div class="greeting">
        <h1>يلا <span>نتدرب 💪</span></h1>
        <p id="today-date"></p>
      </div>

      <button class="quick-log-btn" onclick="showExercisePicker()">
        <span style="font-size:1.3rem">+</span>
        <span>تسجيل تمرين</span>
      </button>

      <div class="section-title">عضلات</div>
      <div class="muscle-grid" id="muscle-grid">
        <div class="loader"><div class="spinner"></div> تحميل...</div>
      </div>

      <div class="section-title">آخر جلسات</div>
      <div id="recent-sessions">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- EXERCISE LIST SCREEN -->
    <div class="screen" id="screen-exercises">
      <div id="exercise-list-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- LOG SESSION SCREEN -->
    <div class="screen" id="screen-log">
      <div id="log-content"></div>
    </div>

    <!-- HISTORY SCREEN -->
    <div class="screen" id="screen-history">
      <div id="history-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>

    <!-- MANAGE SCREEN -->
    <div class="screen" id="screen-manage">
      <div class="manage-tabs">
        <button class="manage-tab active" onclick="switchManageTab('exercises')">التمارين</button>
        <button class="manage-tab" onclick="switchManageTab('muscles')">المجموعات العضلية</button>
      </div>
      <div id="manage-content">
        <div class="loader"><div class="spinner"></div></div>
      </div>
      <button class="quick-log-btn" id="manage-add-btn" onclick="openAddModal()">+ إضافة تمرين</button>
    </div>

    <!-- EXERCISE DETAIL SCREEN -->

let currentScreen = 'home';

function initApp() {
  document.getElementById('today-date').textContent = new Date().toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  loadHome();
}

function navigate(screen) {
  screenStack = [];
  showScreen(screen);
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.nav === screen);
  });
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = {
    home: '🏋️ جيم تراكر',
    history: '📊 السجل',
    manage: '⚙️ الإدارة',
  }[screen];
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  if (name === 'home') loadHome();
  if (name === 'history') loadHistory();
  if (name === 'manage') loadManage();
}

function pushScreen(name, title) {
  screenStack.push(currentScreen);
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  currentScreen = name;
  document.getElementById('back-btn').style.display = 'block';
  document.getElementById('header-title').textContent = title || '';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
}

function goBack() {
  if (screenStack.length > 0) {
    const prev = screenStack.pop();
    if (['home','history','manage'].includes(prev)) {
      navigate(prev);
    } else {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + prev).classList.add('active');
      currentScreen = prev;
      if (screenStack.length === 0) {
        document.getElementById('back-btn').style.display = 'none';
      }
    }
  }
}

async function loadHome() {
  // Load muscle groups with counts
  const { data: exercises } = await sbClient.from('exercises').select('muscle');

  grid.innerHTML = MUSCLES.map(m => `

      <div class="muscle-icon">${m.icon}</div>
      <div class="muscle-name">${m.name}</div>
      <div class="muscle-count">${counts[m.name] || 0} تمرين</div>
    </div>
  `).join('');

  // Recent sessions
  const { data: sessions } = await sbClient
    .from('sessions')
    .select('*')
    .order('logged_at', { ascending: false })
    .limit(8);

  const recentEl = document.getElementById('recent-sessions');
  if (!sessions || sessions.length === 0) {
    recentEl.innerHTML = '<div class="empty-state"><div class="empty-icon">📝</div><p>مفيش جلسات لسه، ابدأ بتسجيل أول تمرين!</p></div>';
    return;
  }

  recentEl.innerHTML = sessions.map(s => {
    const muscle = MUSCLES.find(m => m.name === s.muscle) || { icon: '💪', color: '#888' };
    const maxWeight = Math.max(...(s.sets || []).map(x => x.weight || 0));
    const date = new Date(s.logged_at).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
    return `
      <div class="session-card" onclick="openExerciseDetail('${s.exercise_id}')">
        <div class="session-icon" style="background:${muscle.color}22;">${muscle.icon}</div>
        <div class="session-info">
          <div class="session-name">${s.exercise_name}</div>
          <div class="session-meta">${date} · ${(s.sets||[]).length} مجموعات</div>
        </div>
        <div class="session-weight">${maxWeight} كج</div>
      </div>
    `;
  }).join('');
}

async function loadExerciseList(muscle) {
  const el = document.getElementById('exercise-list-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  let query = sbClient.from('exercises').select('*').order('name');
  if (muscle) query = query.eq('muscle', muscle);
  const { data: exercises } = await query;

  if (!exercises || exercises.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏋️</div><p>مفيش تمارين في هذه المجموعة</p></div>';
    return;
  }

  // Get last session for each exercise
  const ids = exercises.map(e => e.id);
  const { data: lastSessions } = await sbClient
    .from('sessions')
    .select('exercise_id, sets, logged_at')
    .in('exercise_id', ids)
    .order('logged_at', { ascending: false });

  const lastMap = {};
  (lastSessions || []).forEach(s => {
    if (!lastMap[s.exercise_id]) lastMap[s.exercise_id] = s;
  });

  el.innerHTML = exercises.map(ex => {
    const last = lastMap[ex.id];
    const lastText = last
      ? `آخر: ${Math.max(...(last.sets||[]).map(x=>x.weight||0))} كج · ${new Date(last.logged_at).toLocaleDateString('ar-EG',{month:'short',day:'numeric'})}`
      : 'لم يُسجَّل بعد';
    const thumb = ex.image_url
      ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" />`
      : getExerciseIcon(ex.muscle);
    return `
      <div class="exercise-item">
        <div class="exercise-thumb" onclick="openExerciseDetail('${ex.id}')">${thumb}</div>
        <div class="exercise-info" onclick="openExerciseDetail('${ex.id}')">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-last">${lastText}</div>
        </div>
        <div class="exercise-actions">
          <button class="icon-btn" onclick="openLogScreen('${ex.id}')">➕</button>
        </div>
      </div>
    `;
  }).join('');
}

function getExerciseIcon(muscle) {
  const m = MUSCLES.find(x => x.name === muscle);
  return `<span style="font-size:1.4rem;">${m?.icon || '💪'}</span>`;
}

async function openLogScreen(exerciseId) {
  closeModal('modal-picker');
  pushScreen('log', 'تسجيل جلسة');

  const { data: ex } = await sbClient.from('exercises').select('*').eq('id', exerciseId).single();
  currentExercise = ex;

  // Get last session
  const { data: lastSess } = await sbClient
    .from('sessions')
    .select('*')
    .eq('exercise_id', exerciseId)
    .order('logged_at', { ascending: false })
    .limit(1);

  const last = lastSess?.[0];
  const muscle = MUSCLES.find(m => m.name === ex.muscle) || { icon: '💪', color: '#888' };
  const thumb = ex.image_url
    ? `<div class="log-exercise-thumb"><img src="${ex.image_url}" /></div>`
    : `<div class="log-exercise-thumb" style="background:${muscle.color}22;">${muscle.icon}</div>`;

  let prevHtml = '';
  if (last) {
    const maxW = Math.max(...(last.sets||[]).map(x=>x.weight||0));
    const date = new Date(last.logged_at).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
    prevHtml = `
      <div class="prev-record">
        <span style="font-size:1.3rem;">🏆</span>
        <div>
          <div class="label">آخر جلسة (${date})</div>
          <div class="value">${maxW} كج · ${(last.sets||[]).length} مجموعات</div>
        </div>
      </div>`;
  }

  // Build sets from last session or default 3 sets
  const initSets = last?.sets?.length ? last.sets : Array(3).fill({ weight: '', reps: '' });

  document.getElementById('log-content').innerHTML = `
    <div class="log-header">
      ${thumb}
      <div>
        <div style="font-size:1rem;font-weight:700;">${ex.name}</div>
        <div style="font-size:0.8rem;color:${muscle.color};margin-top:3px;">${ex.muscle}</div>
      </div>
    </div>
    ${prevHtml}
    <div class="section-title">المجموعات</div>
    <div class="set-label-row">
      <div></div>
      <div class="set-label">الوزن (كج)</div>
      <div class="set-label">التكرارات</div>
      <div></div>
    </div>
    <div class="sets-container" id="sets-rows">
      ${initSets.map((s,i) => buildSetRow(i+1, s.weight||'', s.reps||'')).join('')}
    </div>
    <button class="add-set-btn" onclick="addSetRow()">+ إضافة مجموعة</button>
    <div class="section-title">ملاحظات</div>
    <textarea class="notes-input" id="session-notes" placeholder="أي ملاحظات؟"></textarea>
    <button class="btn-primary" onclick="saveSession()">💾 حفظ الجلسة</button>
  `;
}

function buildSetRow(num, weight, reps) {
  return `
    <div class="set-row" id="set-row-${num}">
      <div class="set-num">${num}</div>
      <input type="number" class="set-input" id="w-${num}" value="${weight}" placeholder="0" inputmode="decimal" />
      <input type="number" class="set-input" id="r-${num}" value="${reps}" placeholder="0" inputmode="numeric" />
      <button class="icon-btn danger" onclick="removeSetRow(${num})">✕</button>
    </div>`;
}

let setCount = 3;
function addSetRow() {
  setCount++;
  document.getElementById('sets-rows').insertAdjacentHTML('beforeend', buildSetRow(setCount, '', ''));
}
function removeSetRow(num) {
  const row = document.getElementById('set-row-' + num);
  if (row && document.querySelectorAll('.set-row').length > 1) row.remove();
}

async function saveSession() {
  const rows = document.querySelectorAll('.set-row');
  const sets = [];
  rows.forEach(row => {
    const num = row.id.replace('set-row-','');
    const w = parseFloat(document.getElementById('w-'+num)?.value) || 0;
    const r = parseInt(document.getElementById('r-'+num)?.value) || 0;
    sets.push({ weight: w, reps: r });
  });

  const notes = document.getElementById('session-notes')?.value || '';
  const { error } = await sbClient.from('sessions').insert({
    exercise_id: currentExercise.id,
    exercise_name: currentExercise.name,
    muscle: currentExercise.muscle,
    sets,
    notes,
    logged_at: new Date().toISOString(),
  });

  if (error) { showToast('خطأ في الحفظ', 'error'); return; }
  showToast('✅ تم الحفظ', 'success');
  goBack();
}

    <div class="stats-row">
      <div class="stat-box"><div class="stat-val">${maxWeight}</div><div class="stat-label">أقصى وزن (كج)</div></div>
      <div class="stat-box"><div class="stat-val">${totalSessions}</div><div class="stat-label">جلسات</div></div>
      <div class="stat-box"><div class="stat-val">${totalSessions > 0 ? (allWeights.reduce((a,b)=>a+b,0)/allWeights.length).toFixed(1) : 0}</div><div class="stat-label">متوسط الوزن</div></div>
    </div>
    <button class="quick-log-btn" onclick="openLogScreen('${ex.id}')">+ تسجيل جلسة</button>
    <div class="section-title" style="margin-top:8px;">التاريخ</div>
    ${historyHtml}
  `;
}

// ============================================================
// HISTORY SCREEN
// ============================================================
async function loadHistory() {
  const el = document.getElementById('history-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  const { data: sessions } = await sbClient
    .from('sessions')
    .select('*')
    .order('logged_at', { ascending: false })
    .limit(100);

  if (!sessions || sessions.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>لا يوجد سجل بعد</p></div>';
    return;
  }

  // Group by date
  const groups = {};
  sessions.forEach(s => {
    const d = new Date(s.logged_at).toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    if (!groups[d]) groups[d] = [];
    groups[d].push(s);
  });

  el.innerHTML = Object.entries(groups).map(([date, items]) => {
    const itemsHtml = items.map(s => {
      const muscle = MUSCLES.find(m => m.name === s.muscle) || { icon: '💪', color: '#888' };
      const chips = (s.sets||[]).map((x,i) => `<div class="history-set-chip">م${i+1}: <span>${x.weight}كج×${x.reps}</span></div>`).join('');
      return `
        <div class="history-item" onclick="openExerciseDetail('${s.exercise_id}')">
          <div class="history-item-header">
            <div class="history-item-name">${s.exercise_name}</div>
            <span class="history-item-muscle" style="background:${muscle.color}22;color:${muscle.color};">${muscle.icon} ${s.muscle}</span>
          </div>
          <div class="history-sets-grid">${chips}</div>
        </div>`;
    }).join('');
    return `<div class="history-date-group"><div class="history-date">${date}</div>${itemsHtml}</div>`;
  }).join('');
}

// ============================================================
// MANAGE SCREEN
// ============================================================
async function loadManage() {
  await loadManageContent();
}

function switchManageTab(tab) {
  manageTab = tab;
  document.querySelectorAll('.manage-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0&&tab==='exercises')||(i===1&&tab==='muscles'));
  });
  const btn = document.getElementById('manage-add-btn');
  btn.style.display = tab === 'exercises' ? 'flex' : 'none';
  loadManageContent();
}

async function loadManageContent() {
  const el = document.getElementById('manage-content');
  el.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  if (manageTab === 'muscles') {
    const { data: exercises } = await sbClient.from('exercises').select('muscle');
    const counts = {};
    (exercises||[]).forEach(e => { counts[e.muscle] = (counts[e.muscle]||0)+1; });
    el.innerHTML = MUSCLES.map(m => `
      <div class="exercise-item">
        <div class="exercise-thumb" style="background:${m.color}22;font-size:1.4rem;display:flex;align-items:center;justify-content:center;">${m.icon}</div>
        <div class="exercise-info">
          <div class="exercise-name">${m.name}</div>
          <div class="exercise-last">${counts[m.name]||0} تمرين</div>
        </div>
      </div>
    `).join('');
    return;
  }

  const { data: exercises } = await sbClient.from('exercises').select('*').order('muscle').order('name');
  if (!exercises || exercises.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏋️</div><p>لا يوجد تمارين، أضف تمرين!</p></div>';
    return;
  }

  el.innerHTML = exercises.map(ex => {
    const muscle = MUSCLES.find(m => m.name === ex.muscle) || { icon: '💪', color: '#888' };
    const thumb = ex.image_url
      ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:12px;" />`
      : `<span style="font-size:1.4rem;">${muscle.icon}</span>`;
    return `
      <div class="exercise-item">
        <div class="exercise-thumb">${thumb}</div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-last" style="color:${muscle.color};">${ex.muscle}</div>
        </div>
        <div class="exercise-actions">
          <button class="icon-btn" onclick="openEditModal('${ex.id}')">✏️</button>
          <button class="icon-btn danger" onclick="deleteExercise('${ex.id}', '${ex.name.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </div>`;
  }).join('');
}

// ============================================================
// EXERCISE PICKER MODAL
// ============================================================
async function showExercisePicker() {
  const modal = document.getElementById('modal-picker');
  modal.classList.add('open');
  modal.onclick = (e) => { if (e.target === modal) closeModal('modal-picker'); };

  const muscleEl = document.getElementById('picker-muscles');
  muscleEl.innerHTML = `<button style="padding:6px 12px;border-radius:20px;font-family:Cairo,sans-serif;font-size:0.8rem;border:1px solid var(--accent);background:var(--accent);color:#000;cursor:pointer;font-weight:700;" onclick="filterPicker(null, this)">الكل</button>` +
    MUSCLES.map(m => `<button style="padding:6px 12px;border-radius:20px;font-family:Cairo,sans-serif;font-size:0.8rem;border:1px solid ${m.color};background:transparent;color:${m.color};cursor:pointer;" onclick="filterPicker('${m.name}', this)">${m.icon} ${m.name}</button>`).join('');

  await filterPicker(null, muscleEl.children[0]);
}

async function filterPicker(muscle, btn) {
  document.querySelectorAll('#picker-muscles button').forEach(b => {
    b.style.background = 'transparent';
    b.style.color = b.style.borderColor || 'var(--accent)';
    b.style.fontWeight = '400';
  });
  btn.style.background = btn.style.borderColor || 'var(--accent)';
  btn.style.color = '#000';
  btn.style.fontWeight = '700';

  const list = document.getElementById('picker-list');
  list.innerHTML = '<div class="loader"><div class="spinner"></div></div>';

  let q = sbClient.from('exercises').select('*').order('name');
  if (muscle) q = q.eq('muscle', muscle);
  const { data: exercises } = await q;

  list.innerHTML = (exercises||[]).map(ex => {
    const m = MUSCLES.find(x => x.name === ex.muscle) || { icon: '💪', color: '#888' };
    const thumb = ex.image_url
      ? `<img src="${ex.image_url}" style="width:100%;height:100%;object-fit:cover;border-radius:10px;" />`
      : `<span>${m.icon}</span>`;
    return `
      <div class="exercise-item" onclick="openLogScreen('${ex.id}')">
        <div class="exercise-thumb">${thumb}</div>
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-last" style="color:${m.color};">${ex.muscle}</div>
        </div>
        <div style="color:var(--accent);font-size:1.3rem;padding:0 6px;">+</div>
      </div>`;
  }).join('') || '<div class="empty-state"><p>لا يوجد تمارين</p></div>';
}

// ============================================================
// ADD / EDIT EXERCISE MODAL
// ============================================================
function populateMuscleSelect() {
  const sel = document.getElementById('ex-muscle');
  sel.innerHTML = MUSCLES.map(m => `<option value="${m.name}">${m.icon} ${m.name}</option>`).join('');
}

function openAddModal() {
  populateMuscleSelect();
  document.getElementById('modal-exercise-title').textContent = 'إضافة تمرين';
  document.getElementById('ex-id').value = '';
  document.getElementById('ex-name').value = '';
  document.getElementById('ex-current-img').value = '';
  document.getElementById('img-preview').style.display = 'none';
  document.getElementById('modal-exercise').classList.add('open');
  document.getElementById('modal-exercise').onclick = (e) => { if (e.target === document.getElementById('modal-exercise')) closeModal('modal-exercise'); };
}

async function openEditModal(id) {
  populateMuscleSelect();
  const { data: ex } = await sbClient.from('exercises').select('*').eq('id', id).single();
  document.getElementById('modal-exercise-title').textContent = 'تعديل تمرين';
  document.getElementById('ex-id').value = ex.id;
  document.getElementById('ex-name').value = ex.name;
  document.getElementById('ex-muscle').value = ex.muscle;
  document.getElementById('ex-current-img').value = ex.image_url || '';
  if (ex.image_url) {
    document.getElementById('img-preview').src = ex.image_url;
    document.getElementById('img-preview').style.display = 'block';
  } else {
    document.getElementById('img-preview').style.display = 'none';
  }
  document.getElementById('modal-exercise').classList.add('open');
  document.getElementById('modal-exercise').onclick = (e) => { if (e.target === document.getElementById('modal-exercise')) closeModal('modal-exercise'); };
}

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('img-preview');
    img.src = e.target.result;
    img.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function saveExercise() {
  const id = document.getElementById('ex-id').value;
  const name = document.getElementById('ex-name').value.trim();
  const muscle = document.getElementById('ex-muscle').value;
  const fileInput = document.getElementById('ex-image');
  const currentImg = document.getElementById('ex-current-img').value;

  if (!name) { showToast('ادخل اسم التمرين', 'error'); return; }

  let imageUrl = currentImg || null;

  // Upload image if selected
  if (fileInput.files[0]) {
    const file = fileInput.files[0];
    const ext = file.name.split('.').pop();
    const fileName = `${Date.now()}.${ext}`;
    const { error: upErr } = await sbClient.storage
      .from('gym-images')
      .upload(fileName, file, { upsert: true });
    if (!upErr) {
      const { data: urlData } = sbClient.storage.from('gym-images').getPublicUrl(fileName);
      imageUrl = urlData.publicUrl;
    }
  }

  if (id) {
    await sbClient.from('exercises').update({ name, muscle, image_url: imageUrl }).eq('id', id);
    showToast('✅ تم التعديل', 'success');
  } else {
    await sbClient.from('exercises').insert({ name, muscle, image_url: imageUrl });
    showToast('✅ تم الإضافة', 'success');
  }

  closeModal('modal-exercise');
  loadManageContent();
}

async function deleteExercise(id, name) {
  if (!confirm(`هتحذف "${name}"؟`)) return;
  await sbClient.from('exercises').delete().eq('id', id);
  showToast('تم الحذف', 'success');
  loadManageContent();
}

// ============================================================
// UTILS
// ============================================================
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ============================================================
// STARTUP
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
  initSupabase(SUPABASE_URL, SUPABASE_KEY);
});
</script>
